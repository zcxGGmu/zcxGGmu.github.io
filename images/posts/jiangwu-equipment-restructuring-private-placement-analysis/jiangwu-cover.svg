<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="江钨装备投资分析封面">
<style>
  .bg{fill:#f8fafc}.ink{fill:#102033}.muted{fill:#5f6f83}.line{stroke:#cbd5e1;stroke-width:2}.blue{fill:#2563eb}.green{fill:#0f9f6e}.red{fill:#dc2626}.amber{fill:#f59e0b}.card{fill:#fff;stroke:#dbe4ef;stroke-width:1.5;rx:12}.small{font:500 22px 'Noto Sans SC',Arial}.label{font:600 24px 'Noto Sans SC',Arial}.num{font:800 34px 'Plus Jakarta Sans','Noto Sans SC',Arial}.title{font:800 44px 'Noto Sans SC',Arial}.sub{font:500 22px 'Noto Sans SC',Arial}.tiny{font:500 18px 'Noto Sans SC',Arial}
</style>
<rect class="bg" width="1200" height="630"/>
<rect x="70" y="70" width="1060" height="490" rx="26" fill="#ffffff" stroke="#dbe4ef" stroke-width="2"/>
<circle cx="990" cy="130" r="86" fill="#e0f2fe"/><circle cx="1050" cy="210" r="64" fill="#dcfce7"/>
<text x="110" y="152" class="small" fill="#2563eb">600397.SH / 江钨装备 / 江西国资钨产业链平台</text>
<text x="110" y="225" class="title">江钨装备全景投资分析</text>
<text x="110" y="272" class="sub" fill="#475569">重组剥离煤炭亏损资产，定增注入硬质合金、钨粉与钽铌冶炼资产</text>
<g transform="translate(110 340)">
  <rect class="card" width="290" height="130"/><text x="26" y="46" class="label">2025 重组</text><text x="26" y="88" class="num blue">金环磁选 57%</text><text x="26" y="116" class="tiny muted">置出江西煤业等煤炭资产</text>
</g>
<g transform="translate(455 340)">
  <rect class="card" width="290" height="130"/><text x="26" y="46" class="label">2026 定增</text><text x="26" y="88" class="num green">19.07 亿</text><text x="26" y="116" class="tiny muted">修订稿作价，收购三项资产</text>
</g>
<g transform="translate(800 340)">
  <rect class="card" width="290" height="130"/><text x="26" y="46" class="label">投资核心</text><text x="26" y="88" class="num amber">平台化</text><text x="26" y="116" class="tiny muted">看资产注入质量与估值约束</text>
</g>
</svg>
