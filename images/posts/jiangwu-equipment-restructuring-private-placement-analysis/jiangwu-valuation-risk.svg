<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="江钨装备估值约束与风险矩阵">
<style>
  .bg{fill:#f8fafc}.ink{fill:#102033}.muted{fill:#5f6f83}.line{stroke:#cbd5e1;stroke-width:2}.blue{fill:#2563eb}.green{fill:#0f9f6e}.red{fill:#dc2626}.amber{fill:#f59e0b}.card{fill:#fff;stroke:#dbe4ef;stroke-width:1.5;rx:12}.small{font:500 22px 'Noto Sans SC',Arial}.label{font:600 24px 'Noto Sans SC',Arial}.num{font:800 34px 'Plus Jakarta Sans','Noto Sans SC',Arial}.title{font:800 44px 'Noto Sans SC',Arial}.sub{font:500 22px 'Noto Sans SC',Arial}.tiny{font:500 18px 'Noto Sans SC',Arial}
</style><rect class="bg" width="1200" height="680"/><text x="70" y="70" class="title">估值约束：交易预期已经很贵，后续看兑现</text><text x="70" y="108" class="sub muted">按2026-06-12 Yahoo Finance抓取价14.72元与总股本9.8996亿股估算</text>
<g transform="translate(80 160)"><rect class="card" width="320" height="170"/><text x="24" y="46" class="label">当前市值</text><text x="24" y="104" class="num blue">145.7 亿</text><text x="24" y="140" class="tiny muted">约为2025末归母净资产的76倍</text></g>
<g transform="translate(440 160)"><rect class="card" width="320" height="170"/><text x="24" y="46" class="label">定增上限</text><text x="24" y="104" class="num amber">+30%</text><text x="24" y="140" class="tiny muted">最多发行2.9699亿股，股本摊薄约三成</text></g>
<g transform="translate(800 160)"><rect class="card" width="320" height="170"/><text x="24" y="46" class="label">标的静态盈利</text><text x="24" y="104" class="num green">1.32 亿</text><text x="24" y="140" class="tiny muted">三家公司2025净利合计，经审计</text></g>
<g transform="translate(80 380)"><rect class="card" width="1040" height="210"/><text x="28" y="48" class="label">四个必须跟踪的风险阈值</text><text x="44" y="92" class="small">1. 审批进度：临时股东会、国资审批、上交所审核、中国证监会注册。</text><text x="44" y="128" class="small">2. 估值与稀释：发行底价、募集是否足额、认购结构决定每股收益和控制权。</text><text x="44" y="164" class="small">3. 资产质量：华茂收入大但负债高，江硬扩产期资本开支与产能利用率要验证。</text><text x="44" y="200" class="small">4. 承诺兑现：金环2025年未达承诺，新标的承诺不等同于整体净利润保底。</text></g>
</svg>
