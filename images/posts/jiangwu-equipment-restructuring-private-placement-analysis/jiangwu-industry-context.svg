<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="钨行业供给约束与中国地位">
<style>
  .bg{fill:#f8fafc}.ink{fill:#102033}.muted{fill:#5f6f83}.line{stroke:#cbd5e1;stroke-width:2}.blue{fill:#2563eb}.green{fill:#0f9f6e}.red{fill:#dc2626}.amber{fill:#f59e0b}.card{fill:#fff;stroke:#dbe4ef;stroke-width:1.5;rx:12}.small{font:500 22px 'Noto Sans SC',Arial}.label{font:600 24px 'Noto Sans SC',Arial}.num{font:800 34px 'Plus Jakarta Sans','Noto Sans SC',Arial}.title{font:800 44px 'Noto Sans SC',Arial}.sub{font:500 22px 'Noto Sans SC',Arial}.tiny{font:500 18px 'Noto Sans SC',Arial}
</style><rect class="bg" width="1200" height="660"/><text x="70" y="70" class="title">钨行业背景：资源集中、开采配额、出口管制共同抬高战略属性</text><text x="70" y="108" class="sub muted">USGS MCS 2025：2024年全球钨矿产量约8.1万吨，中国约6.7万吨</text>
<g transform="translate(90 170)"><rect class="card" width="300" height="340"/><text x="28" y="48" class="label">全球矿产量</text><circle cx="150" cy="190" r="100" fill="#dbeafe"/><path d="M150 90 A100 100 0 1 1 63 239 L150 190 Z" fill="#2563eb"/><text x="88" y="196" class="num">82.7%</text><text x="56" y="300" class="tiny muted">中国 6.7 万吨 / 全球 8.1 万吨</text></g>
<g transform="translate(450 170)"><rect class="card" width="300" height="340"/><text x="28" y="48" class="label">全球储量</text><rect x="42" y="250" width="80" height="60" fill="#0f9f6e"/><rect x="150" y="120" width="80" height="190" fill="#94a3b8"/><text x="36" y="238" class="num green">240</text><text x="143" y="108" class="num muted">460+</text><text x="32" y="338" class="tiny muted">中国</text><text x="143" y="338" class="tiny muted">全球</text><text x="32" y="82" class="tiny muted">单位：万吨，钨含量</text></g>
<g transform="translate(810 170)"><rect class="card" width="300" height="340"/><text x="28" y="48" class="label">政策变量</text><text x="28" y="102" class="num amber">5.8 万吨</text><text x="28" y="132" class="tiny muted">2025第一批钨矿开采总量指标</text><text x="28" y="210" class="num blue">No.10</text><text x="28" y="242" class="tiny muted">2025年钨等物项出口管制</text><text x="28" y="305" class="tiny muted">结论：资源与政策属性强于普通工业金属</text></g>
</svg>