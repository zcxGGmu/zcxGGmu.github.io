<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="江钨装备近期研报与公告补充矩阵">
<style>
  .bg{fill:#f8fafc}.card{fill:#ffffff;stroke:#dbe4ef;stroke-width:1.5;rx:12}.ink{fill:#102033}.muted{fill:#64748b}.blue{fill:#2563eb}.green{fill:#0f9f6e}.amber{fill:#d97706}.red{fill:#dc2626}.title{font:800 46px 'Noto Sans SC',Arial}.sub{font:500 22px 'Noto Sans SC',Arial}.label{font:700 25px 'Noto Sans SC',Arial}.body{font:500 20px 'Noto Sans SC',Arial}.tiny{font:500 17px 'Noto Sans SC',Arial}.num{font:800 34px 'Plus Jakarta Sans','Noto Sans SC',Arial}
</style>
<rect class="bg" width="1280" height="760"/>
<text x="70" y="76" class="title ink">江钨装备：近期公开材料更新了三个判断锚点</text>
<text x="70" y="114" class="sub muted">公司级研报仍以国盛为主；6 月修订稿把交易价格、审计评估和业绩补偿口径落到纸面</text>
<g transform="translate(70 160)">
  <rect class="card" width="350" height="250"/>
  <circle cx="40" cy="42" r="16" class="blue"/>
  <text x="70" y="51" class="label ink">国盛 2026-04 点评</text>
  <text x="28" y="92" class="body ink">25Q4 单季扭亏为盈</text>
  <text x="28" y="126" class="body ink">维持“买入”评级</text>
  <text x="28" y="166" class="num blue">0.75 / 0.89 / 1.02</text>
  <text x="28" y="198" class="tiny muted">2026-2028E 归母净利润，单位：亿元</text>
  <text x="28" y="228" class="tiny muted">股价口径：2026-04-17 收盘价 15.15 元</text>
</g>
<g transform="translate(465 160)">
  <rect class="card" width="350" height="250"/>
  <circle cx="40" cy="42" r="16" class="green"/>
  <text x="70" y="51" class="label ink">定增修订稿 2026-06</text>
  <text x="28" y="92" class="body ink">募集资金上限更新</text>
  <text x="28" y="132" class="num green">19.07 亿</text>
  <text x="28" y="166" class="body ink">三家标的最终交易作价</text>
  <text x="28" y="200" class="tiny muted">江硬 8.98 亿 / 华茂 7.21 亿 / 九冶 2.87 亿</text>
  <text x="28" y="228" class="tiny muted">审计报告与评估报告已出具</text>
</g>
<g transform="translate(860 160)">
  <rect class="card" width="350" height="250"/>
  <circle cx="40" cy="42" r="16" class="amber"/>
  <text x="70" y="51" class="label ink">业绩补偿口径</text>
  <text x="28" y="92" class="body ink">约束收益法评估资产</text>
  <text x="28" y="126" class="body ink">非整体净利润保底</text>
  <text x="28" y="166" class="num amber">1058.93 / 1102.96 / 918.16</text>
  <text x="28" y="198" class="tiny muted">若 2026 年交割，2026-2028 年主营营业利润分成数，单位：万元</text>
  <text x="28" y="228" class="tiny muted">另有收益法/市场法资产减值补偿安排</text>
</g>
<g transform="translate(70 455)">
  <rect class="card" width="1140" height="205"/>
  <text x="30" y="50" class="label ink">行业侧补充：钨价顺风仍要穿过加工价差和并表质量</text>
  <text x="30" y="92" class="body ink">中金观点：钨的新兴需求及战略属性增强，供给偏紧格局未改，短期大跌后有望企稳回升。</text>
  <g transform="translate(30 125)">
    <text x="0" y="28" class="tiny muted">2025 年钨精矿</text><text x="170" y="28" class="num blue">14.2 → 45.6</text><text x="360" y="28" class="tiny muted">万元/吨</text>
    <text x="0" y="70" class="tiny muted">2026 年 3 月高点</text><text x="170" y="70" class="num red">&gt;100</text><text x="280" y="70" class="tiny muted">万元/吨</text>
    <text x="500" y="70" class="tiny muted">5 月低点</text><text x="610" y="70" class="num amber">40.6</text><text x="720" y="70" class="tiny muted">万元/吨</text>
    <text x="855" y="70" class="tiny muted">5 月 29 日</text><text x="970" y="70" class="num green">41.6</text>
  </g>
</g>
</svg>
