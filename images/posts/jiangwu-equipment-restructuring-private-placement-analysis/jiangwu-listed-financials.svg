<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="江钨装备上市公司财务口径切换">
<style>
  .bg{fill:#f8fafc}.ink{fill:#102033}.muted{fill:#5f6f83}.line{stroke:#cbd5e1;stroke-width:2}.blue{fill:#2563eb}.green{fill:#0f9f6e}.red{fill:#dc2626}.amber{fill:#f59e0b}.card{fill:#fff;stroke:#dbe4ef;stroke-width:1.5;rx:12}.small{font:500 22px 'Noto Sans SC',Arial}.label{font:600 24px 'Noto Sans SC',Arial}.num{font:800 34px 'Plus Jakarta Sans','Noto Sans SC',Arial}.title{font:800 44px 'Noto Sans SC',Arial}.sub{font:500 22px 'Noto Sans SC',Arial}.tiny{font:500 18px 'Noto Sans SC',Arial}
</style><rect class="bg" width="1200" height="660"/><text x="70" y="70" class="title">上市公司口径：2025仍是煤炭亏损尾部，2026Q1才体现轻装上阵</text><text x="70" y="108" class="sub muted">单位：亿元；2025年因同一控制下企业合并重述比较报表，前后期可比性弱</text>
<g transform="translate(80 170)"><rect class="card" width="320" height="360"/><text x="28" y="48" class="label">2025 年报</text><text x="28" y="100" class="num blue">25.75</text><text x="28" y="132" class="tiny muted">营业收入</text><text x="28" y="195" class="num red">-2.91</text><text x="28" y="227" class="tiny muted">归母净利润</text><text x="28" y="290" class="num red">-0.93</text><text x="28" y="322" class="tiny muted">经营现金流</text></g>
<g transform="translate(440 170)"><rect class="card" width="320" height="360"/><text x="28" y="48" class="label">2026Q1</text><text x="28" y="100" class="num blue">0.65</text><text x="28" y="132" class="tiny muted">营业收入</text><text x="28" y="195" class="num green">0.013</text><text x="28" y="227" class="tiny muted">归母净利润</text><text x="28" y="290" class="num green">0.13</text><text x="28" y="322" class="tiny muted">经营现金流</text></g>
<g transform="translate(800 170)"><rect class="card" width="320" height="360"/><text x="28" y="48" class="label">分部质量</text><text x="28" y="98" class="num red">-2.73</text><text x="28" y="130" class="tiny muted">2025煤炭分部利润总额</text><text x="28" y="195" class="num green">0.57</text><text x="28" y="227" class="tiny muted">2025磁选装备分部利润总额</text><text x="28" y="290" class="num amber">1.91</text><text x="28" y="322" class="tiny muted">2025末归母净资产</text></g>
<text x="88" y="595" class="sub">投资含义：当前市值买的不是2025亏损报表，而是“重组后壳体 + 后续资产注入 + 钨景气”的预期；因此兑现节奏比静态利润更重要。</text>
</svg>