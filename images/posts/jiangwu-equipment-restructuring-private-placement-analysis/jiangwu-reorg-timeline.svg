423" class="label" font-size="20">定增预案</text><text x="865" y="447" class="tiny muted">拟募18.82亿收购三项资产</text><circle cx="1080" cy="305" r="12" fill="#0f9f6e"/><line x1="1080" y1="305" x2="1080" y2="220" class="line"/><rect x="1008" y="170" width="144" height="96" class="card"/><text x="1025" y="201" class="tiny" fill="#2563eb">2026-06</text><text x="1025" y="228" class="label" font-size="20">定增修订</text><text x="1025" y="252" class="tiny muted">审计评估完成，作价19.07亿</text>
