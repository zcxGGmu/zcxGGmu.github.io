<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-label="2025重大资产置换结构">
<style>
  .bg{fill:#f8fafc}.ink{fill:#102033}.muted{fill:#5f6f83}.line{stroke:#cbd5e1;stroke-width:2}.blue{fill:#2563eb}.green{fill:#0f9f6e}.red{fill:#dc2626}.amber{fill:#f59e0b}.card{fill:#fff;stroke:#dbe4ef;stroke-width:1.5;rx:12}.small{font:500 22px 'Noto Sans SC',Arial}.label{font:600 24px 'Noto Sans SC',Arial}.num{font:800 34px 'Plus Jakarta Sans','Noto Sans SC',Arial}.title{font:800 44px 'Noto Sans SC',Arial}.sub{font:500 22px 'Noto Sans SC',Arial}.tiny{font:500 18px 'Noto Sans SC',Arial}
</style><rect class="bg" width="1200" height="660"/><text x="70" y="72" class="title">2025 重大资产置换：从煤炭亏损到磁选装备</text><text x="70" y="112" class="sub muted">交易不发行股份，核心是资产对价互换和差额现金补足</text>
<g transform="translate(80 180)"><rect class="card" width="300" height="250"/><text x="28" y="48" class="label">置出资产</text><text x="28" y="96" class="num red">3.6977 亿</text><text x="28" y="132" class="tiny muted">上市公司除保留资产及负债外的全部资产负债</text><text x="28" y="170" class="tiny muted">以江西煤业 100% 股权承接煤炭业务</text><text x="28" y="208" class="tiny muted">置出资产交易作价：36,977.10 万元</text></g>
<g transform="translate(450 180)"><rect class="card" width="300" height="250"/><text x="28" y="48" class="label">置入资产</text><text x="28" y="96" class="num blue">3.6870 亿</text><text x="28" y="132" class="tiny muted">金环磁选 8,550 万股</text><text x="28" y="170" class="tiny muted">对应股比 57.00%</text><text x="28" y="208" class="tiny muted">金环100%评估值：64,683.96 万元</text></g>
<g transform="translate(820 180)"><rect class="card" width="300" height="250"/><text x="28" y="48" class="label">差额与承诺</text><text x="28" y="96" class="num green">107.24 万</text><text x="28" y="132" class="tiny muted">江钨发展向上市公司现金补足</text><text x="28" y="170" class="tiny muted">2025承诺净利：5,469.03 万</text><text x="28" y="208" class="tiny muted">实际扣非归母：4,541.48 万，完成率83.04%</text></g>
<path d="M385 305 C420 285 420 285 445 305" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#a)"/><path d="M755 305 C790 285 790 285 815 305" fill="none" stroke="#0f9f6e" stroke-width="5" marker-end="url(#a)"/>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<text x="90" y="520" class="sub">投资含义：重组先解决上市公司煤炭亏损资产与高负债问题，但金环磁选第一年即未达承诺，说明新资产质量仍要用订单、现金流和承诺兑现检验。</text>
</svg>