<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="2026定增标的公司审计财务与评估作价">
<style>
  .bg{fill:#f8fafc}.ink{fill:#102033}.muted{fill:#5f6f83}.blue{fill:#2563eb}.green{fill:#0f9f6e}.amber{fill:#d97706}.card{fill:#fff;stroke:#dbe4ef;stroke-width:1.5;rx:12}.pill{fill:#eff6ff;stroke:#bfdbfe}.small{font:500 22px 'Noto Sans SC',Arial}.label{font:600 24px 'Noto Sans SC',Arial}.num{font:800 34px 'Plus Jakarta Sans','Noto Sans SC',Arial}.title{font:800 44px 'Noto Sans SC',Arial}.sub{font:500 22px 'Noto Sans SC',Arial}.tiny{font:500 18px 'Noto Sans SC',Arial}
</style>
<rect class="bg" width="1200" height="680"/>
<text x="70" y="70" class="title">2026 定增标的：审计后收入仍主要来自华茂，作价合计 19.07 亿</text>
<text x="70" y="108" class="sub muted">单位：亿元；2025 年财务数据为 2026 年 6 月修订稿披露的经审计口径</text>
<g transform="translate(100 165)">
  <rect class="card" width="280" height="415"/>
  <text x="24" y="44" class="label">江硬公司</text>
  <text x="24" y="76" class="tiny muted">硬质合金 / 数控刀片</text>
  <rect x="58" y="263.7" width="52" height="66.3" class="blue"/>
  <rect x="142" y="299.0" width="52" height="31.0" class="green"/>
  <text x="39" y="360" class="tiny">收入</text><text x="126" y="360" class="tiny">净利</text>
  <text x="36" y="251.7" class="tiny blue">7.55</text><text x="124" y="287.0" class="tiny green">0.24</text>
  <rect x="24" y="378" width="232" height="28" rx="8" class="pill"/><text x="38" y="398" class="tiny">评估作价 8.98 亿，PB 1.17x</text>
</g>
<g transform="translate(460 165)">
  <rect class="card" width="280" height="415"/>
  <text x="24" y="44" class="label">华茂公司</text>
  <text x="24" y="76" class="tiny muted">钨粉 / 碳化钨粉</text>
  <rect x="58" y="50" width="52" height="280" class="blue"/>
  <rect x="142" y="238.2" width="52" height="91.8" class="green"/>
  <text x="39" y="360" class="tiny">收入</text><text x="126" y="360" class="tiny">净利</text>
  <text x="31" y="38" class="tiny blue">31.90</text><text x="119" y="226.2" class="tiny green">0.71</text>
  <rect x="24" y="378" width="232" height="28" rx="8" class="pill"/><text x="38" y="398" class="tiny">评估作价 7.21 亿，PB 1.30x</text>
</g>
<g transform="translate(820 165)">
  <rect class="card" width="280" height="415"/>
  <text x="24" y="44" class="label">九冶公司</text>
  <text x="24" y="76" class="tiny muted">钽铌冶炼及制品</text>
  <rect x="58" y="272.6" width="52" height="57.4" class="blue"/>
  <rect x="142" y="283.7" width="52" height="46.3" class="green"/>
  <text x="39" y="360" class="tiny">收入</text><text x="126" y="360" class="tiny">净利</text>
  <text x="36" y="260.6" class="tiny blue">6.54</text><text x="124" y="271.7" class="tiny green">0.36</text>
  <rect x="24" y="378" width="232" height="28" rx="8" class="pill"/><text x="38" y="398" class="tiny">评估作价 2.87 亿，PB 1.85x</text>
</g>
<g transform="translate(80 602)">
  <rect x="0" y="0" width="1040" height="46" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="22" y="30" class="small amber">合计：收入 45.99 亿，净利润 1.32 亿，所有者权益 14.79 亿；交易作价 19.07 亿，静态约 14.5x PE / 1.29x PB。</text>
</g>
</svg>
