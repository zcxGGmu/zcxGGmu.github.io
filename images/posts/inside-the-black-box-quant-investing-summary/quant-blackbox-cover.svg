  <text x="152" y="350" text-anchor="start" font-size="34" font-weight="600" fill="#334155" class=""><tspan x="152" dy="-22.44">从信号、组合、交易到风控的系统化</tspan><tspan x="152" dy="44.88">投资框架</tspan></text>
