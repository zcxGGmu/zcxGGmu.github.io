<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="650" viewBox="0 0 1400 650" role="img" aria-labelledby="title desc">
  <title id="title">量化投资系统责任分层</title>
  <desc id="desc">量化投资系统责任分层</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <linearGradient id="coverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="46%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", monospace; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>

  <text x="700" y="60" text-anchor="middle" font-size="38" font-weight="800" fill="#1f2933" class=""><tspan x="700" dy="0">量化系统不是一个模型，而是一组分层责任</tspan></text>

    <rect x="210" y="90" width="980" height="78" rx="12" fill="#ffedd5" stroke="#c2410c" stroke-width="2" opacity="1" />
    <text x="305" y="139" text-anchor="middle" font-size="26" font-weight="800" fill="#c2410c" class=""><tspan x="305" dy="0">治理层</tspan></text>
    <text x="760" y="139" text-anchor="middle" font-size="23" font-weight="500" fill="#1f2933" class=""><tspan x="760" dy="0">投资目标、授权边界、风控红线、模型变更审批</tspan></text>

    <rect x="210" y="190" width="980" height="78" rx="12" fill="#dcfce7" stroke="#2f855a" stroke-width="2" opacity="1" />
    <text x="305" y="239" text-anchor="middle" font-size="26" font-weight="800" fill="#2f855a" class=""><tspan x="305" dy="0">组合层</tspan></text>
    <text x="760" y="239" text-anchor="middle" font-size="23" font-weight="500" fill="#1f2933" class=""><tspan x="760" dy="0">预期收益 - 风险 - 成本 - 约束：共同决定目标权重</tspan></text>

    <rect x="210" y="300" width="980" height="78" rx="12" fill="#ccfbf1" stroke="#0f766e" stroke-width="2" opacity="1" />
    <text x="305" y="349" text-anchor="middle" font-size="26" font-weight="800" fill="#0f766e" class=""><tspan x="305" dy="0">模型层</tspan></text>
    <text x="760" y="349" text-anchor="middle" font-size="23" font-weight="500" fill="#1f2933" class=""><tspan x="760" dy="0">Alpha、风险、交易成本、容量、执行质量模型</tspan></text>

    <rect x="210" y="410" width="980" height="78" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2" opacity="1" />
    <text x="305" y="459" text-anchor="middle" font-size="26" font-weight="800" fill="#2563eb" class=""><tspan x="305" dy="0">数据层</tspan></text>
    <text x="760" y="459" text-anchor="middle" font-size="23" font-weight="500" fill="#1f2933" class=""><tspan x="760" dy="0">行情、财报、基本面、订单簿、事件、另类数据</tspan></text>

    <rect x="210" y="520" width="980" height="78" rx="12" fill="#e2e8f0" stroke="#334155" stroke-width="2" opacity="1" />
    <text x="305" y="569" text-anchor="middle" font-size="26" font-weight="800" fill="#334155" class=""><tspan x="305" dy="0">基础设施</tspan></text>
    <text x="760" y="569" text-anchor="middle" font-size="23" font-weight="500" fill="#1f2933" class=""><tspan x="760" dy="0">数据清洗、回测、监控、交易接口、审计日志</tspan></text>

  <line x1="700" y1="505" x2="700" y2="488" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="700" y1="395" x2="700" y2="378" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="700" y1="285" x2="700" y2="268" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="700" y1="175" x2="700" y2="158" stroke="#334155" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="72" y="165" width="96" height="350" rx="12" fill="#ffffff" stroke="#d9e2ec" stroke-width="2" opacity="1" />
  <text x="120" y="245" text-anchor="middle" font-size="28" font-weight="800" fill="#334155" class=""><tspan x="120" dy="-36.96">可</tspan><tspan x="120" dy="36.96">检</tspan><tspan x="120" dy="36.96">查</tspan></text>
  <text x="120" y="365" text-anchor="middle" font-size="28" font-weight="800" fill="#334155" class=""><tspan x="120" dy="-36.96">可</tspan><tspan x="120" dy="36.96">复</tspan><tspan x="120" dy="36.96">盘</tspan></text>
  <text x="120" y="485" text-anchor="middle" font-size="28" font-weight="800" fill="#334155" class=""><tspan x="120" dy="-18.48">可</tspan><tspan x="120" dy="36.96">治理</tspan></text>
  <rect x="1232" y="165" width="96" height="350" rx="12" fill="#ffffff" stroke="#d9e2ec" stroke-width="2" opacity="1" />
  <text x="1280" y="245" text-anchor="middle" font-size="25" font-weight="800" fill="#c2410c" class=""><tspan x="1280" dy="-49.5">防</tspan><tspan x="1280" dy="33">过</tspan><tspan x="1280" dy="33">拟</tspan><tspan x="1280" dy="33">合</tspan></text>
  <text x="1280" y="385" text-anchor="middle" font-size="25" font-weight="800" fill="#b7791f" class=""><tspan x="1280" dy="-33">防</tspan><tspan x="1280" dy="33">拥</tspan><tspan x="1280" dy="33">挤</tspan></text>
  <text x="1280" y="500" text-anchor="middle" font-size="25" font-weight="800" fill="#2f855a" class=""><tspan x="1280" dy="-33">防</tspan><tspan x="1280" dy="33">失</tspan><tspan x="1280" dy="33">控</tspan></text>

</svg>
