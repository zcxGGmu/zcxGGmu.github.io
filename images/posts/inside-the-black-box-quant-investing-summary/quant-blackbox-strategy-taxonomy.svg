<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="640" viewBox="0 0 1400 640" role="img" aria-labelledby="title desc">
  <title id="title">量化策略谱系与时间尺度</title>
  <desc id="desc">量化策略谱系与时间尺度</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <linearGradient id="coverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="46%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .mono { font-family: "SFMono-Regular", "Menlo", "Consolas", monospace; }
  </style>
  <rect width="100%" height="100%" fill="#f8fafc"/>

  <text x="700" y="74" text-anchor="middle" font-size="40" font-weight="800" fill="#1f2933" class=""><tspan x="700" dy="0">量化不是一种策略，而是一条策略谱系</tspan></text>
  <text x="700" y="126" text-anchor="middle" font-size="22" font-weight="450" fill="#52606d" class=""><tspan x="700" dy="0">越短周期越依赖执行和市场微观结构；越长周期越依赖研究假设、数据质量和风险预算。</tspan></text>

    <rect x="80" y="170" width="300" height="156" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2" opacity="1" />
    <text x="230" y="214" text-anchor="middle" font-size="24" font-weight="800" fill="#2563eb" class=""><tspan x="230" dy="0">高频 / 做市 / 微观结构</tspan></text>
    <text x="230" y="260" text-anchor="middle" font-size="21" font-weight="650" fill="#1f2933" class=""><tspan x="230" dy="0">毫秒到分钟</tspan></text>
    <text x="230" y="298" text-anchor="middle" font-size="18" font-weight="480" fill="#52606d" class=""><tspan x="230" dy="0">速度、订单簿、库存控制</tspan></text>

    <rect x="390" y="170" width="300" height="156" rx="12" fill="#ccfbf1" stroke="#0f766e" stroke-width="2" opacity="1" />
    <text x="540" y="214" text-anchor="middle" font-size="24" font-weight="800" fill="#0f766e" class=""><tspan x="540" dy="0">统计套利 / 均值回归</tspan></text>
    <text x="540" y="260" text-anchor="middle" font-size="21" font-weight="650" fill="#1f2933" class=""><tspan x="540" dy="0">分钟到数天</tspan></text>
    <text x="540" y="298" text-anchor="middle" font-size="18" font-weight="480" fill="#52606d" class=""><tspan x="540" dy="0">价差、配对、短期偏离</tspan></text>

    <rect x="700" y="170" width="300" height="156" rx="12" fill="#dcfce7" stroke="#2f855a" stroke-width="2" opacity="1" />
    <text x="850" y="214" text-anchor="middle" font-size="24" font-weight="800" fill="#2f855a" class=""><tspan x="850" dy="0">趋势 / 动量</tspan></text>
    <text x="850" y="260" text-anchor="middle" font-size="21" font-weight="650" fill="#1f2933" class=""><tspan x="850" dy="0">数天到数月</tspan></text>
    <text x="850" y="298" text-anchor="middle" font-size="18" font-weight="480" fill="#52606d" class=""><tspan x="850" dy="0">延续性、止损、波动过滤</tspan></text>

    <rect x="1010" y="170" width="300" height="156" rx="12" fill="#fef3c7" stroke="#b7791f" stroke-width="2" opacity="1" />
    <text x="1160" y="214" text-anchor="middle" font-size="24" font-weight="800" fill="#b7791f" class=""><tspan x="1160" dy="0">基本面 / 事件 / 质量</tspan></text>
    <text x="1160" y="260" text-anchor="middle" font-size="21" font-weight="650" fill="#1f2933" class=""><tspan x="1160" dy="0">季度到数年</tspan></text>
    <text x="1160" y="298" text-anchor="middle" font-size="18" font-weight="480" fill="#52606d" class=""><tspan x="1160" dy="0">估值、盈利、公告事件</tspan></text>

    <rect x="235" y="400" width="300" height="156" rx="12" fill="#eef2ff" stroke="#2563eb" stroke-width="2" opacity="1" />
    <text x="385" y="444" text-anchor="middle" font-size="24" font-weight="800" fill="#2563eb" class=""><tspan x="385" dy="0">机器学习 / 另类数据</tspan></text>
    <text x="385" y="490" text-anchor="middle" font-size="21" font-weight="650" fill="#1f2933" class=""><tspan x="385" dy="0">跨时间尺度</tspan></text>
    <text x="385" y="528" text-anchor="middle" font-size="18" font-weight="480" fill="#52606d" class=""><tspan x="385" dy="0">特征工程、验证、模型治理</tspan></text>

    <rect x="855" y="400" width="300" height="156" rx="12" fill="#ffedd5" stroke="#c2410c" stroke-width="2" opacity="1" />
    <text x="1005" y="444" text-anchor="middle" font-size="24" font-weight="800" fill="#c2410c" class=""><tspan x="1005" dy="0">组合与风险预算</tspan></text>
    <text x="1005" y="490" text-anchor="middle" font-size="21" font-weight="650" fill="#1f2933" class=""><tspan x="1005" dy="0">横跨所有策略</tspan></text>
    <text x="1005" y="528" text-anchor="middle" font-size="18" font-weight="480" fill="#52606d" class=""><tspan x="1005" dy="0">相关性、容量、杠杆、回撤</tspan></text>

  <line x1="190" y1="360" x2="1210" y2="360" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
  <circle cx="190" cy="360" r="9" fill="#2563eb"/>
  <circle cx="1210" cy="360" r="9" fill="#b7791f"/>
  <text x="190" y="386" text-anchor="middle" font-size="20" font-weight="700" fill="#2563eb" class=""><tspan x="190" dy="0">交易速度</tspan></text>
  <text x="1210" y="386" text-anchor="middle" font-size="20" font-weight="700" fill="#b7791f" class=""><tspan x="1210" dy="0">研究深度</tspan></text>

</svg>
