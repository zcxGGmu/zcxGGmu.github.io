<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',Arial,sans-serif}
.title{font-size:38px;font-weight:800;fill:#0f172a}.sub{font-size:18px;fill:#475569}.h{font-size:15px;font-weight:800;fill:#64748b}.label{font-size:16px;font-weight:800;fill:#0f172a}.small{font-size:13px;fill:#475569}.tiny{font-size:12px;fill:#64748b}.card{fill:#fff;stroke:#dbe3ef;stroke-width:1.2}.grid{stroke:#e2e8f0;stroke-width:1}.axis{stroke:#cbd5e1;stroke-width:1.2}.blue{fill:#2563eb}.green{fill:#0f766e}.orange{fill:#ea580c}.red{fill:#dc2626}.slate{fill:#334155}.softblue{fill:#eff6ff}.softgreen{fill:#ecfdf5}.softorange{fill:#fff7ed}
</style>
<rect width="1200" height="630" fill="#f8fafc"/>
<rect x="40" y="38" width="1120" height="554" rx="26" class="card"/>
<text x="76" y="104" class="title">中国宏桥近期研报汇总</text>
<text x="76" y="142" class="sub">高股息、铝价弹性、一体化成本优势与周期分歧</text>
<g transform="translate(76,196)">
  <rect width="240" height="132" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="24" y="42" class="h">覆盖机构</text><text x="24" y="92" style="font-size:46px;font-weight:900;fill:#2563eb">16</text><text x="92" y="92" class="small">家公开线索</text>
</g>
<g transform="translate(344,196)">
  <rect width="240" height="132" rx="18" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="24" y="42" class="h">目标价区间</text><text x="24" y="92" style="font-size:42px;font-weight:900;fill:#0f766e">34-49.8</text><text x="170" y="92" class="small">港元</text>
</g>
<g transform="translate(612,196)">
  <rect width="240" height="132" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="24" y="42" class="h">2026E净利</text><text x="24" y="92" style="font-size:42px;font-weight:900;fill:#ea580c">321-348</text><text x="184" y="92" class="small">亿元</text>
</g>
<g transform="translate(880,196)">
  <rect width="240" height="132" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="24" y="42" class="h">核心争议</text><text x="24" y="80" class="label">铝价差能否维持</text><text x="24" y="108" class="small">氧化铝利润与分红持续性</text>
</g>
<line x1="76" y1="382" x2="1124" y2="382" class="axis"/>
<text x="76" y="428" class="label">本文口径</text><text x="190" y="428" class="small">只汇总公开可检索的 2026 年券商观点与PDF/页面线索，图片为本地自制数据图。</text>
<text x="76" y="470" class="label">公司基准</text><text x="190" y="470" class="small">2025 年收入 1623.54 亿元，归母净利润 226.36 亿元，经营现金流 389.95 亿元。</text>
<text x="76" y="512" class="label">研究重点</text><text x="190" y="512" class="small">不要只看单个目标价，要拆成铝价、氧化铝、电力、分红、回购、资本开支和估值倍数。</text>
</svg>