<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">中国宏桥 B 站视频补充框架</title>
  <desc id="desc">三条 B 站铝投资分析视频的核心变量：铝价供给冲击、铜铝横向比较、几内亚铝土矿政策。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="48" y="44" width="1184" height="672" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="80" y="106" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="34" font-weight="700" fill="#0f172a">B 站视频补充：中国宏桥的三个行业验证维度</text>
  <text x="80" y="146" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="18" fill="#475569">从宏观铝价、铜铝比较、几内亚矿端政策三条线，补充券商研报之外的跟踪变量。</text>

  <g transform="translate(80,188)">
    <rect width="345" height="410" rx="18" fill="#f1f5f9" stroke="#cbd5e1"/>
    <rect width="345" height="78" rx="18" fill="#0369a1"/>
    <text x="24" y="36" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="22" font-weight="700" fill="#ffffff">1. 花旗铝价观点</text>
    <text x="24" y="62" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#e0f2fe">供给冲击 + 极低库存</text>
    <text x="24" y="122" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#0f172a">关键数字</text>
    <text x="24" y="158" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">目标：4000 美元/吨</text>
    <text x="24" y="190" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">乐观情景：约 5350 美元/吨</text>
    <text x="24" y="222" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">供给冲击：超过 300 万吨</text>
    <text x="24" y="254" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">库存：冲突前处 55 年低位</text>
    <text x="24" y="286" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">2026 缺口：约 277 万吨</text>
    <line x1="24" x2="321" y1="320" y2="320" stroke="#cbd5e1"/>
    <text x="24" y="354" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#0f172a">对宏桥的含义</text>
    <text x="24" y="385" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#334155">铝价上沿决定吨铝利润弹性，</text>
    <text x="24" y="409" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#334155">但必须扣除氧化铝、电力等成本。</text>
  </g>

  <g transform="translate(468,188)">
    <rect width="345" height="410" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect width="345" height="78" rx="18" fill="#0f766e"/>
    <text x="24" y="36" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="22" font-weight="700" fill="#ffffff">2. 铜 vs 铝比较</text>
    <text x="24" y="62" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#ccfbf1">需求增量相似，供给约束不同</text>
    <text x="24" y="122" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#0f172a">视频框架</text>
    <text x="24" y="158" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">铜：矿山品位、开发周期、</text>
    <text x="24" y="184" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">电网和 AI 数据中心需求</text>
    <text x="24" y="226" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">铝：中国 4500 万吨产能红线</text>
    <text x="24" y="252" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">对冲变量：印尼新增电解铝产能</text>
    <text x="24" y="286" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">结论：铝更依赖供给纪律</text>
    <line x1="24" x2="321" y1="320" y2="320" stroke="#cbd5e1"/>
    <text x="24" y="354" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#0f172a">对宏桥的含义</text>
    <text x="24" y="385" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#334155">不能只看铝价 beta，需跟踪</text>
    <text x="24" y="409" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#334155">全球新增供给是否稀释景气度。</text>
  </g>

  <g transform="translate(856,188)">
    <rect width="345" height="410" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
    <rect width="345" height="78" rx="18" fill="#c2410c"/>
    <text x="24" y="36" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="22" font-weight="700" fill="#ffffff">3. 几内亚铝土新政</text>
    <text x="24" y="62" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#ffedd5">矿端政策 + 本地加工</text>
    <text x="24" y="122" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#0f172a">可核验背景</text>
    <text x="24" y="158" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">2025 出货：约 1.83 亿吨</text>
    <text x="24" y="190" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">约占中国铝土矿进口四分之三</text>
    <text x="24" y="222" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">政策方向：出口控制 + 本地精炼</text>
    <text x="24" y="254" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">拟新增氧化铝厂：5 座</text>
    <text x="24" y="286" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#334155">合计氧化铝产能：720 万吨/年</text>
    <line x1="24" x2="321" y1="320" y2="320" stroke="#fed7aa"/>
    <text x="24" y="354" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="17" font-weight="700" fill="#0f172a">对宏桥的含义</text>
    <text x="24" y="385" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#334155">矿权、物流、氧化铝配套越稳，</text>
    <text x="24" y="409" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#334155">越能抵御矿端政策再定价。</text>
  </g>

  <rect x="80" y="632" width="1120" height="48" rx="12" fill="#0f172a"/>
  <text x="108" y="663" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="18" font-weight="700" fill="#ffffff">落脚点：</text>
  <text x="188" y="663" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="18" fill="#e2e8f0">中国宏桥的研究需要同时看铝价上沿、全球新增供给、几内亚矿端政策和公司一体化成本曲线。</text>
</svg>
