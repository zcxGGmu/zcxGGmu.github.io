<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',Arial,sans-serif}
.title{font-size:38px;font-weight:800;fill:#0f172a}.sub{font-size:18px;fill:#475569}.h{font-size:15px;font-weight:800;fill:#64748b}.label{font-size:16px;font-weight:800;fill:#0f172a}.small{font-size:13px;fill:#475569}.tiny{font-size:12px;fill:#64748b}.card{fill:#fff;stroke:#dbe3ef;stroke-width:1.2}.grid{stroke:#e2e8f0;stroke-width:1}.axis{stroke:#cbd5e1;stroke-width:1.2}.blue{fill:#2563eb}.green{fill:#0f766e}.orange{fill:#ea580c}.red{fill:#dc2626}.slate{fill:#334155}.softblue{fill:#eff6ff}.softgreen{fill:#ecfdf5}.softorange{fill:#fff7ed}
</style>
<rect width="1200" height="760" fill="#f8fafc"/><rect x="34" y="28" width="1132" height="704" rx="24" class="card"/>
<text x="68" y="76" class="title">后续跟踪框架</text><text x="68" y="108" class="sub">把目标价拆成可验证变量，而不是只盯单一评级</text>
<g transform="translate(76,160)"><rect width="1048" height="90" rx="16" fill="#ffffff" stroke="#dbe3ef"/><rect x="0" y="0" width="10" height="90" rx="5" class="blue"/><text x="34" y="36" class="label">铝价与价差</text><text x="34" y="66" class="small">LME/SHFE铝价、氧化铝价格、电力成本、阳极和烧碱成本</text></g>
<g transform="translate(76,278)"><rect width="1048" height="90" rx="16" fill="#ffffff" stroke="#dbe3ef"/><rect x="0" y="0" width="10" height="90" rx="5" class="green"/><text x="34" y="36" class="label">资源与一体化</text><text x="34" y="66" class="small">几内亚铝土矿、氧化铝自给、云南绿电、物流与海运费</text></g>
<g transform="translate(76,396)"><rect width="1048" height="90" rx="16" fill="#ffffff" stroke="#dbe3ef"/><rect x="0" y="0" width="10" height="90" rx="5" class="orange"/><text x="34" y="36" class="label">股东回报</text><text x="34" y="66" class="small">每股派息、回购注销、控股股东增持、资本开支纪律</text></g>
<g transform="translate(76,514)"><rect width="1048" height="90" rx="16" fill="#ffffff" stroke="#dbe3ef"/><rect x="0" y="0" width="10" height="90" rx="5" class="slate"/><text x="34" y="36" class="label">估值切换</text><text x="34" y="66" class="small">高股息资产、周期利润正常化、绿色铝和深加工占比</text></g>
<text x="76" y="686" class="tiny">基准判断：乐观情形看铝价和分红双支撑；谨慎情形看氧化铝利润回落与铝价差正常化。</text>
</svg>