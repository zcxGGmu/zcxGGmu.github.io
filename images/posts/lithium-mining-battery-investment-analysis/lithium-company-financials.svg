ext-anchor="middle">-79.0</text><circle cx="571" cy="423.5825" r="7" fill="#4c8c57" stroke="#ffffff" stroke-width="3" opacity="1"/><text x="571" y="410.5825" fill="#4c8c57" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="800" text-anchor="middle">4.63</text><circle cx="756" cy="391.78999999999996" r="7" fill="#4c8c57" stroke="#ffffff" stroke-width="3" opacity="1"/><text x="756" y="378.78999999999996" fill="#4c8c57" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="800" text-anchor="middle">18.76</text><path d="M 201 357.3425 L 386 410.53249999999997 L 571 419.1275 L 756 422.99749999999995" fill="none" stroke="#c98528" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="201" cy="357.3425" r="7" fill="#c98528" stroke="#ffffff" stroke-width="3" opacity="1"/><text x="201" y="344.3425" fill="#c98528" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="800" text-anchor="middle">34.07</text><circle cx="386" cy="410.53249999999997" r="7" fill="#c98528" stroke="#ffffff" stroke-width="3" opacity="1"/><text x="386" y="397.53249999999997" fill="#c98528" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="800" text-anchor="middle">10.43</text><circle cx="571" cy="419.1275" r="7" fill="#c98528" stroke="#ffffff" stroke-width="3" opacity="1"/><text x="571" y="406.1275" fill="#c98528" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="800" text-anchor="middle">6.61</text><circle cx="756" cy="422.99749999999995" r="7" fill="#c98528" stroke="#ffffff" stroke-width="3" opacity="1"/><text x="756" y="409.99749999999995" fill="#c98528" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="800" text-anchor="middle">4.89</text><text x="201" y="648" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="800" text-anchor="middle">2023</text><text x="386" y="648" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="800" text-anchor="middle">2024</text><text x="571" y="648" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="800" text-anchor="middle">2025</text><text x="756" y="648" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="800" text-anchor="middle">2026Q1</text><rect x="575" y="239" width="26" height="14" rx="4" fill="#1f73b7" stroke="none" stroke-width="0" opacity="1"/><text x="611" y="254" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" text-anchor="start">融捷</text>
<rect x="665" y="239" width="26" height="14" rx="4" fill="#4c8c57" stroke="none" stroke-width="0" opacity="1"/><text x="701" y="254" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" text-anchor="start">天齐</text>
<rect x="755" y="239" width="26" height="14" rx="4" fill="#c98528" stroke="none" stroke-width="0" opacity="1"/><text x="791" y="254" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" text-anchor="start">永兴</text><rect x="925" y="248" width="330" height="106" rx="14" fill="#dcebf7" stroke="#dce3ea" stroke-width="1" opacity="1"/><text x="950" y="283" fill="#1f73b7" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="900" text-anchor="start">融捷股份</text><text x="950" y="317" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="750" text-anchor="start">2026Q1 收入 3.76 亿，归母 2.78 亿</text><text x="950" y="344" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="650" text-anchor="start"><tspan x="950" dy="0">国内硬岩矿弹性高，2026Q1 利润受</tspan><tspan x="950" dy="24">锂精矿量价与联营投资收益拉动。</tspan></text><rect x="925" y="388" width="330" height="106" rx="14" fill="#e0efe4" stroke="#dce3ea" stroke-width="1" opacity="1"/><text x="950" y="423" fill="#4c8c57" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="900" text-anchor="start">天齐锂业</text><text x="950" y="457" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="750" text-anchor="start">2026Q1 收入 51.28 亿，归母 18.76 亿</text><text x="950" y="484" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="650" text-anchor="start"><tspan x="950" dy="0">全球资源最强，利润受锂价、SQM 权益</tspan><tspan x="950" dy="24">法、少数股东和汇率共同影响。</tspan></text><rect x="925" y="528" width="330" height="106" rx="14" fill="#f8ead7" stroke="#dce3ea" stroke-width="1" opacity="1"/><text x="950" y="563" fill="#c98528" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="900" text-anchor="start">永兴材料</text><text x="950" y="597" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="750" text-anchor="start">2026Q1 收入 24.29 亿，归母 4.89 亿</text><text x="950" y="624" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="650" text-anchor="start"><tspan x="950" dy="0">锂云母一体化 + 特钢底盘，锂价上行弹</tspan><tspan x="950" dy="24">性被双主业结构部分摊薄。</tspan></text>
  <text x="82" y="770" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" text-anchor="start">数据来源：融捷股份、天齐锂业、永兴材料 2025 年报及 2026Q1 公告</text>
</svg>
