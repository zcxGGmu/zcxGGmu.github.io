  <text x="92" y="205" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="800" text-anchor="start">2026Q1 三家公司利润均修复，但修复来源和可持续性不同。</text><rect x="96" y="230" width="782" height="450" rx="18" fill="#ffffff" stroke="#dce3ea" stroke-width="1" opacity="1"/><text x="115" y="252" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">归母净利润（亿元）</text><line x1="115" y1="614" x2="835" y2="614" stroke="#d8e0e7" stroke-width="1" opacity="1"/><text x="101" y="620" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" text-anchor="end">-80</text><line x1="115" y1="524" x2="835" y2="524" stroke="#d8e0e7" stroke-width="1" opacity="1"/><text x="101" y="530" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" text-anchor="end">-40</text><line x1="115" y1="434" x2="835" y2="434" stroke="#9aabb7" stroke-width="2" opacity="1"/><text x="101" y="440" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" text-anchor="end">0</text><line x1="115" y1="344" x2="835" y2="344" stroke="#d8e0e7" stroke-width="1" opacity="1"/><text x="101" y="350" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" text-anchor="end">40</text><line x1="115" y1="254" x2="835" y2="254" stroke="#d8e0e7" stroke-width="1" opacity="1"/><text x="101" y="260" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" text-anchor="end">80</text><path d="M 201 425.45000000000005 L 386 429.1625 L 571 427.72249999999997 L 756 427.745" fill="none" stroke="#1f73b7"