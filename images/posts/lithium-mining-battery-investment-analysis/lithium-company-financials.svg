  <text x="82" y="102" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="850" text-anchor="start">三家公司财务弹性：同样修复，不同驱动</text>
