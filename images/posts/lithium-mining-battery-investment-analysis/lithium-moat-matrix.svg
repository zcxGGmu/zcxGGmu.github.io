<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">技术壁垒与护城河：资源、工艺、认证和环保</title>
  <desc id="desc">5 分为相对更强；为研究框架评分，不是投资评级</desc>
  <rect width="1400" height="820" fill="#fbfcfd"/>
  <rect x="36" y="32" width="1328" height="756" rx="22" fill="#f3f6f8" stroke="#dce3ea"/>
  <text x="82" y="102" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="850" text-anchor="start">技术壁垒与护城河：资源、工艺、认证和环保</text>
  <text x="82" y="146" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="500" text-anchor="start">5 分为相对更强；为研究框架评分，不是投资评级</text>
  <text x="92" y="205" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="800" text-anchor="start">技术壁垒不是单一专利，而是资源、工艺、客户认证和环保能力的组合。</text><polygon points="700,380 743.3012701892219,405 743.3012701892219,455 700,480 656.6987298107781,455 656.6987298107781,405.00000000000006" fill="none" stroke="#d8e0e7" stroke-width="1" opacity="1"/><polygon points="700,330 786.6025403784439,380 786.6025403784439,480 700,530 613.3974596215562,480.00000000000006 613.3974596215561,380.00000000000006" fill="none" stroke="#d8e0e7" stroke-width="1" opacity="1"/><polygon points="700,280 829.9038105676658,355 829.9038105676658,505 700,580 570.0961894323342,505.00000000000006 570.0961894323341,355.0000000000001" fill="none" stroke="#d8e0e7" stroke-width="1" opacity="1"/><polygon points="700,230 873.2050807568877,330 873.2050807568878,530 700,630 526.7949192431123,530.0000000000001 526.7949192431122,330.0000000000001" fill="none" stroke="#d8e0e7" stroke-width="1" opacity="1"/><polygon points="700,180 916.5063509461097,305 916.5063509461097,555 700,680 483.4936490538904,555.0000000000001 483.49364905389024,305.00000000000017" fill="none" stroke="#d8e0e7" stroke-width="1" opacity="1"/><line x1="700" y1="430" x2="700" y2="180" stroke="#d8e0e7" stroke-width="1" opacity="1"/><text x="700" y="124" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="850" text-anchor="middle">资源禀赋</text><line x1="700" y1="430" x2="916.5063509461097" y2="305" stroke="#d8e0e7" stroke-width="1" opacity="1"/><text x="970.1999259807449" y="280" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="850" text-anchor="start">成本位置</text><line x1="700" y1="430" x2="916.5063509461097" y2="555" stroke="#d8e0e7" stroke-width="1" opacity="1"/><text x="970.1999259807449" y="592" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="850" text-anchor="start">产品质量</text><line x1="700" y1="430" x2="700" y2="680" stroke="#d8e0e7" stroke-width="1" opacity="1"/><text x="700" y="748" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="850" text-anchor="middle">客户认证</text><line x1="700" y1="430" x2="483.4936490538904" y2="555.0000000000001" stroke="#d8e0e7" stroke-width="1" opacity="1"/><text x="429.8000740192552" y="592.0000000000001" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="850" text-anchor="end">现金流韧性</text><line x1="700" y1="430" x2="483.49364905389024" y2="305.00000000000017" stroke="#d8e0e7" stroke-width="1" opacity="1"/><text x="429.800074019255" y="280.0000000000002" fill="#16212c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="850" text-anchor="end">扩产确定性</text><path d="M 700 230 L 873.2050807568877 330 L 829.9038105676658 505 L 700 580 L 570.0961894323342 505.00000000000006 L 570.0961894323341 355.0000000000001 Z" fill="#1f73b7" opacity="0.14" stroke="#1f73b7" stroke-width="3"/><path d="M 700 180 L 873.2050807568877 330 L 916.5063509461097 555 L 700 680 L 526.7949192431123 530.0000000000001 L 526.7949192431122 330.0000000000001 Z" fill="#4c8c57" opacity="0.17" stroke="#4c8c57" stroke-width="3"/><path d="M 700 280 L 873.2050807568877 330 L 873.2050807568878 530 L 700 630 L 483.4936490538904 555.0000000000001 L 526.7949192431122 330.0000000000001 Z" fill="#c98528" opacity="0.2" stroke="#c98528" stroke-width="3"/><rect x="1020" y="215" width="26" height="14" rx="4" fill="#1f73b7" stroke="none" stroke-width="0" opacity="1"/><text x="1056" y="230" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" text-anchor="start">融捷</text>
<rect x="1112" y="215" width="26" height="14" rx="4" fill="#4c8c57" stroke="none" stroke-width="0" opacity="1"/><text x="1148" y="230" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" text-anchor="start">天齐</text>
<rect x="1204" y="215" width="26" height="14" rx="4" fill="#c98528" stroke="none" stroke-width="0" opacity="1"/><text x="1240" y="230" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" text-anchor="start">永兴</text><circle cx="1020" cy="571" r="7" fill="#1f73b7" stroke="none" stroke-width="0" opacity="1"/><text x="1040" y="578" fill="#1f73b7" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="900" text-anchor="start">融捷</text><text x="1098" y="578" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="650" text-anchor="start">国内高品位锂辉石矿弹性强，但并表锂盐规模小，扩产进度需跟踪。</text><circle cx="1020" cy="619" r="7" fill="#4c8c57" stroke="none" stroke-width="0" opacity="1"/><text x="1040" y="626" fill="#4c8c57" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="900" text-anchor="start">天齐</text><text x="1098" y="626" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="650" text-anchor="start">全球资源和客户认证最完整，是上游核心资产，但海外和权益法变量多。</text><circle cx="1020" cy="667" r="7" fill="#c98528" stroke="none" stroke-width="0" opacity="1"/><text x="1040" y="674" fill="#c98528" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="900" text-anchor="start">永兴</text><text x="1098" y="674" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="650" text-anchor="start">锂云母工艺与特钢现金流构成韧性，长期看环保和低品位成本纪律。</text>
  <text x="82" y="770" fill="#63707c" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" text-anchor="start">数据来源：公司年报、产品/质量体系披露；评分为基于公开资料的研究判断</text>
</svg>
