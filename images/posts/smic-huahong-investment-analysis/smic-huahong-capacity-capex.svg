<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">产能与资本开支：规模、利用率与现金流的拉扯</title>
  <desc id="desc">月产能均为折合 8 英寸等效片；资本开支和经营现金流为 2026Q1</desc>
  <rect width="1400" height="820" fill="#fbfcfd"/>
  <rect x="36" y="32" width="1328" height="756" rx="22" fill="#f4f7f9" stroke="#dce3ea"/>
  <text x="82" y="102" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="800" text-anchor="start">产能与资本开支：规模、利用率与现金流的拉扯</text>
  <text x="82" y="146" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="500" text-anchor="start">月产能均为折合 8 英寸等效片；资本开支和经营现金流为 2026Q1</text>
  <rect x="955" y="179" width="26" height="14" rx="4" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><text x="991" y="194" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" text-anchor="start">中芯国际</text>
<rect x="1115" y="179" width="26" height="14" rx="4" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><text x="1151" y="194" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" text-anchor="start">华虹半导体</text><text x="92" y="205" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="800" text-anchor="start">中芯绝对产能更大，华虹扩产强度相对收入更重。</text><text x="110" y="260" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="800" text-anchor="start">2025 月产能（千片/月）</text><rect x="390" y="231" width="640" height="28" rx="8" fill="#e8eef4" stroke="none" stroke-width="0" opacity="1"/><rect x="390" y="231" width="605" height="28" rx="8" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><rect x="390" y="277" width="640" height="28" rx="8" fill="#e8eef4" stroke="none" stroke-width="0" opacity="1"/><rect x="390" y="277" width="277.7142857142857" height="28" rx="8" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><text x="1060" y="253" fill="#1b76b8" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">1059</text><text x="1060" y="299" fill="#c77d1f" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">486</text><text x="110" y="355" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="800" text-anchor="start">2026Q1 月产能（千片/月）</text><rect x="390" y="326" width="640" height="28" rx="8" fill="#e8eef4" stroke="none" stroke-width="0" opacity="1"/><rect x="390" y="326" width="616.1428571428571" height="28" rx="8" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><rect x="390" y="372" width="640" height="28" rx="8" fill="#e8eef4" stroke="none" stroke-width="0" opacity="1"/><rect x="390" y="372" width="279.42857142857144" height="28" rx="8" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><text x="1060" y="348" fill="#1b76b8" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">1078</text><text x="1060" y="394" fill="#c77d1f" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">489</text><text x="110" y="450" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="800" text-anchor="start">2026Q1 资本开支（十亿美元）</text><rect x="390" y="421" width="640" height="28" rx="8" fill="#e8eef4" stroke="none" stroke-width="0" opacity="1"/><rect x="390" y="421" width="588.4235294117648" height="28" rx="8" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><rect x="390" y="467" width="640" height="28" rx="8" fill="#e8eef4" stroke="none" stroke-width="0" opacity="1"/><rect x="390" y="467" width="348.2352941176471" height="28" rx="8" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><text x="1060" y="443" fill="#1b76b8" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">1.563</text><text x="1060" y="489" fill="#c77d1f" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">0.925</text><text x="110" y="545" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="800" text-anchor="start">2026Q1 经营现金流（十亿美元）</text><rect x="390" y="516" width="640" height="28" rx="8" fill="#e8eef4" stroke="none" stroke-width="0" opacity="1"/><rect x="390" y="516" width="548" height="28" rx="8" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><rect x="390" y="562" width="640" height="28" rx="8" fill="#e8eef4" stroke="none" stroke-width="0" opacity="1"/><rect x="390" y="562" width="104" height="28" rx="8" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><text x="1060" y="538" fill="#1b76b8" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">0.685</text><text x="1060" y="584" fill="#c77d1f" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">0.130</text><rect x="118" y="655" width="1160" height="72" rx="14" fill="#fff7eb" stroke="#efd7b5" stroke-width="1" opacity="1"/><text x="146" y="690" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="750" text-anchor="start">关键矛盾：两家公司都在重资本开支周期，经营现金流不能完全覆盖扩产投入，折旧吸收和需求持续性是估值核心变量。</text>
  <text x="82" y="770" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" text-anchor="start">数据来源：中芯国际 2026Q1 公告；华虹半导体 2026Q1 公告</text>
</svg>
