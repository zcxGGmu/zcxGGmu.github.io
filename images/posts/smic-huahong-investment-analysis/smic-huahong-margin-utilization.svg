<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">盈利质量：毛利率与产能利用率</title>
  <desc id="desc">华虹利用率更高，但毛利率仍低；中芯规模和产品组合带来更强盈利厚度</desc>
  <rect width="1400" height="820" fill="#fbfcfd"/>
  <rect x="36" y="32" width="1328" height="756" rx="22" fill="#f4f7f9" stroke="#dce3ea"/>
  <text x="82" y="102" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="800" text-anchor="start">盈利质量：毛利率与产能利用率</text>
  <text x="82" y="146" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="500" text-anchor="start">华虹利用率更高，但毛利率仍低；中芯规模和产品组合带来更强盈利厚度</text>
  <text x="92" y="205" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="800" text-anchor="start">一个看盈利厚度，一个看产能紧张度。</text><rect x="100" y="236" width="560" height="428" rx="18" fill="#ffffff" stroke="#dce3ea" stroke-width="1.2" opacity="1"/><text x="130" y="286" fill="#1b76b8" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="850" text-anchor="start">中芯国际</text><text x="134" y="340" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" text-anchor="start">2025 毛利率</text><rect x="310" y="316" width="280" height="28" rx="8" fill="#edf2f6" stroke="none" stroke-width="0" opacity="1"/><rect x="310" y="316" width="168" height="28" rx="8" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><text x="610" y="340" fill="#1b76b8" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="850" text-anchor="end">21.0%</text><text x="134" y="410" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" text-anchor="start">2026Q1 毛利率</text><rect x="310" y="386" width="280" height="28" rx="8" fill="#edf2f6" stroke="none" stroke-width="0" opacity="1"/><rect x="310" y="386" width="160.8" height="28" rx="8" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><text x="610" y="410" fill="#1b76b8" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="850" text-anchor="end">20.1%</text><text x="134" y="480" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" text-anchor="start">2025 产能利用率</text><rect x="310" y="456" width="280" height="28" rx="8" fill="#edf2f6" stroke="none" stroke-width="0" opacity="1"/><rect x="310" y="456" width="227.65217391304347" height="28" rx="8" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><text x="610" y="480" fill="#1b76b8" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="850" text-anchor="end">93.5%</text><text x="134" y="550" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" text-anchor="start">2026Q1 产能利用率</text><rect x="310" y="526" width="280" height="28" rx="8" fill="#edf2f6" stroke="none" stroke-width="0" opacity="1"/><rect x="310" y="526" width="226.6782608695652" height="28" rx="8" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><text x="610" y="550" fill="#1b76b8" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="850" text-anchor="end">93.1%</text><line x1="134" y1="602" x2="626" y2="602" stroke="#dce3ea" stroke-width="1" opacity="1"/><text x="134" y="632" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" text-anchor="start"><tspan x="134" dy="0">规模更大，毛利率显著高于华虹；但扩产带来的折旧压力</tspan><tspan x="134" dy="28">已经在销售成本里持续体现。</tspan></text><rect x="740" y="236" width="560" height="428" rx="18" fill="#ffffff" stroke="#dce3ea" stroke-width="1.2" opacity="1"/><text x="770" y="286" fill="#c77d1f" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="850" text-anchor="start">华虹半导体</text><text x="774" y="340" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" text-anchor="start">2025 毛利率</text><rect x="950" y="316" width="280" height="28" rx="8" fill="#edf2f6" stroke="none" stroke-width="0" opacity="1"/><rect x="950" y="316" width="94.4" height="28" rx="8" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><text x="1250" y="340" fill="#c77d1f" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="850" text-anchor="end">11.8%</text><text x="774" y="410" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" text-anchor="start">2026Q1 毛利率</text><rect x="950" y="386" width="280" height="28" rx="8" fill="#edf2f6" stroke="none" stroke-width="0" opacity="1"/><rect x="950" y="386" width="104" height="28" rx="8" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><text x="1250" y="410" fill="#c77d1f" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="850" text-anchor="end">13.0%</text><text x="774" y="480" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" text-anchor="start">2025 产能利用率</text><rect x="950" y="456" width="280" height="28" rx="8" fill="#edf2f6" stroke="none" stroke-width="0" opacity="1"/><rect x="950" y="456" width="258.3304347826087" height="28" rx="8" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><text x="1250" y="480" fill="#c77d1f" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="850" text-anchor="end">106.1%</text><text x="774" y="550" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" text-anchor="start">2026Q1 产能利用率</text><rect x="950" y="526" width="280" height="28" rx="8" fill="#edf2f6" stroke="none" stroke-width="0" opacity="1"/><rect x="950" y="526" width="242.74782608695654" height="28" rx="8" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><text x="1250" y="550" fill="#c77d1f" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="850" text-anchor="end">99.7%</text><line x1="774" y1="602" x2="1266" y2="602" stroke="#dce3ea" stroke-width="1" opacity="1"/><text x="774" y="632" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" text-anchor="start"><tspan x="774" dy="0">利用率更紧，毛利率处于修复通道；FAB9 爬坡决定</tspan><tspan x="774" dy="28">后续折旧吸收能力。</tspan></text>
  <text x="82" y="770" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" text-anchor="start">数据来源：两家公司 2025 年报及 2026Q1 公告</text>
</svg>
