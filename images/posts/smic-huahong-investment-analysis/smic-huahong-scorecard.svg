  <text x="82" y="146" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="21" font-weight="500" text-anchor="start">主观评分用于组织分析框架，不代表目标价或评级</text>
  <text x="92" y="205" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="800" text-anchor="start">不是谁绝对更好，而是风险收益结构不同。</text><rect x="1000" y="179" width="26" height="14" rx="4" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><text x="1036" y="194" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" text-anchor="start">中芯国际</text>
<rect x="1160" y="179" width="26" height="14" rx="4" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><text x="1196" y="194" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" text-anchor="start">华虹半导体</text><text x="120" y="260" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">规模与客户覆盖</text><circle cx="390" cy="253" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="590" cy="253" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="422" cy="253" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="622" cy="253" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="454" cy="253" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="654" cy="253" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="486" cy="253" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="686" cy="253" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="518" cy="253" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="718" cy="253" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><text x="790" y="243" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" text-anchor="start"><tspan x="790" dy="0">中芯收入、产能、平台覆盖显著更大。</tspan></text><line x1="120" y1="291" x2="1280" y2="291" stroke="#e1e7ed" stroke-width="1" opacity="1"/><text x="120" y="332" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">特色工艺辨识度</text><circle cx="390" cy="325" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="590" cy="325" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="422" cy="325" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="622" cy="325" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="454" cy="325" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="654" cy="325" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="486" cy="325" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="686" cy="325" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="518" cy="325" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="718" cy="325" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><text x="790" y="315" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" text-anchor="start"><tspan x="790" dy="0">华虹在 eNVM、BCD、功率器件、MCU 更</tspan><tspan x="790" dy="24">集中。</tspan></text><line x1="120" y1="363" x2="1280" y2="363" stroke="#e1e7ed" stroke-width="1" opacity="1"/><text x="120" y="404" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">盈利厚度</text><circle cx="390" cy="397" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="590" cy="397" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="422" cy="397" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="622" cy="397" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="454" cy="397" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="654" cy="397" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="486" cy="397" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="686" cy="397" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="518" cy="397" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="718" cy="397" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><text x="790" y="387" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" text-anchor="start"><tspan x="790" dy="0">中芯毛利率约 20%，华虹仍在修复。</tspan></text><line x1="120" y1="435" x2="1280" y2="435" stroke="#e1e7ed" stroke-width="1" opacity="1"/><text x="120" y="476" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">利用率弹性</text><circle cx="390" cy="469" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="590" cy="469" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="422" cy="469" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="622" cy="469" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="454" cy="469" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="654" cy="469" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="486" cy="469" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="686" cy="469" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="518" cy="469" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="718" cy="469" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><text x="790" y="459" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" text-anchor="start"><tspan x="790" dy="0">华虹 2025 超 100%，中芯稳定在 90</tspan><tspan x="790" dy="24">%+。</tspan></text><line x1="120" y1="507" x2="1280" y2="507" stroke="#e1e7ed" stroke-width="1" opacity="1"/><text x="120" y="548" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">资本开支压力</text><circle cx="390" cy="541" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="590" cy="541" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="422" cy="541" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="622" cy="541" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="454" cy="541" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="654" cy="541" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="486" cy="541" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="686" cy="541" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="518" cy="541" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="718" cy="541" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><text x="790" y="531" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" text-anchor="start"><tspan x="790" dy="0">两者均重，华虹相对收入的 Q1 Capex 更</tspan><tspan x="790" dy="24">高。</tspan></text><line x1="120" y1="579" x2="1280" y2="579" stroke="#e1e7ed" stroke-width="1" opacity="1"/><text x="120" y="620" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="850" text-anchor="start">出口管制敏感度</text><circle cx="390" cy="613" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="590" cy="613" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="422" cy="613" r="10" fill="#1b76b8" stroke="none" stroke-width="0" opacity="1"/><circle cx="622" cy="613" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="454" cy="613" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="654" cy="613" r="10" fill="#c77d1f" stroke="none" stroke-width="0" opacity="1"/><circle cx="486" cy="613" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="686" cy="613" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="518" cy="613" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><circle cx="718" cy="613" r="10" fill="#dce3ea" stroke="none" stroke-width="0" opacity="1"/><text x="790" y="603" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" text-anchor="start"><tspan x="790" dy="0">中芯先进制程叙事更敏感；华虹偏成熟特色但仍受设</tspan><tspan x="790" dy="24">备周期影响。</tspan></text><rect x="118" y="704" width="1164" height="36" rx="8" fill="#eaf0f5" stroke="none" stroke-width="0" opacity="1"/><text x="144" y="728" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="750" text-anchor="start">结论：偏稳健看中芯的规模与盈利，偏弹性看华虹的特色工艺修复；两者都不能忽视折旧和估值。</text>
