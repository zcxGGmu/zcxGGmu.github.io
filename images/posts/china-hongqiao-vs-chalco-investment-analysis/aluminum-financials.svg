ll="#1f76b4" stroke="none" stroke-width="0" opacity="1"/><text x="1058" y="467" fill="#1f76b4" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="850" text-anchor="start">107</text><rect x="288" y="484" width="760" height="20" rx="7" fill="#e7edf2" stroke="none" stroke-width="0" opacity="1"/><rect x="288" y="484" width="639.5822222222222" height="20" rx="7" fill="#b56f26" stroke="none" stroke-width="0" opacity="1"/><text x="1058" y="501" fill="#b56f26" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="850" text-anchor="start">151</text><text x="128" y="550" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="780" text-anchor="start">毛利率（%）</text><rect x="288" y="522" width="760" height="20" rx="7" fill="#e7edf2" stroke="none" stroke-width="0" opacity="1"/><rect x="288" y="522" width="648.5333333333334" height="20" rx="7" fill="#1f76b4" stroke="none" stroke-width="0" opacity="1"/><text x="1058" y="539" fill="#1f76b4" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="850" text-anchor="start">25.6</text><rect x="288" y="556" width="760" height="20" rx="7" fill="#e7edf2" stroke="none" stroke-width="0" opacity="1"/><rect x="288" y="556" width="456.76000000000005" height="20" rx="7" fill="#b56f26" stroke="none" stroke-width="0" opacity="1"/><text x="1058" y="573" fill="#b56f26" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="850" text-anchor="start">18.0</text><text x="128" y="622" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="780" text-anchor="start">资产负债率（%）</text><rect x="288" y="594" width="760" height="20" rx="7" fill="#e7edf2" stroke="none" stroke-width="0" opacity="1"/><rect x="288" y="594" width="583.1272727272727" height="20" rx="7" fill="#1f76b4" stroke="none" stroke-width="0" opacity="1"/><text x="1058" y="611" fill="#1f76b4" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="850" text-anchor="start">42.2</text><rect x="288" y="628" width="760" height="20" rx="7" fill="#e7edf2" stroke="none" stroke-width="0" opacity="1"/><rect x="288" y="628" width="635.7745454545454" height="20" rx="7" fill="#b56f26" stroke="none" stroke-width="0" opacity="1"/><text x="1058" y="645" fill="#b56f26" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="850" text-anchor="start">46.0</text><rect x="1020" y="288" width="248" height="284" rx="16" fill="#ffffff" stroke="#dce3ea" stroke-width="1" opacity="1"/><text x="1048" y="334" fill="#17212b" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="900" text-anchor="start">读图要点</text><text x="1048" y="382" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="720" text-anchor="start"><tspan x="1048" dy="0">1. 中铝收入含贸易属性，</tspan><tspan x="1048" dy="29">   收入规模不等于利润厚度。</tspan><tspan x="1048" dy="29">2. 宏桥利润弹性来自</tspan><tspan x="1048" dy="29">   铝价、氧化铝和成本曲线。</tspan><tspan x="1048" dy="29">3. 两家公司现金流都强，</tspan><tspan x="1048" dy="29">   但扩产与资源投入消耗资本。</tspan></text>
  <text x="82" y="770" fill="#65737e" font-family="Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="500" text-anchor="start">数据来源：中国宏桥 2025 年业绩公告；中国铝业 2025 年年度报告</text>
