<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="codex-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="hermes-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="big-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.05">
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="120" fill="rgba(34,211,238,0.05)"/>
  <circle cx="1000" cy="480" r="150" fill="rgba(167,139,250,0.05)"/>
  <circle cx="600" cy="300" r="180" fill="rgba(251,113,133,0.03)"/>

  <!-- Codex icon area -->
  <rect x="80" y="200" width="180" height="180" rx="20" fill="rgba(34,211,238,0.1)" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
  <text x="170" y="280" fill="#22d3ee" font-family="monospace" font-size="36" font-weight="700" text-anchor="middle">C</text>
  <text x="170" y="320" fill="rgba(255,255,255,0.7)" font-family="monospace" font-size="14" text-anchor="middle">CODEX</text>
  <text x="170" y="345" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="11" text-anchor="middle">OpenAI</text>

  <!-- VS symbol -->
  <rect x="310" y="270" width="60" height="40" rx="20" fill="rgba(251,113,133,0.2)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="340" y="296" fill="#fb7185" font-family="monospace" font-size="18" font-weight="700" text-anchor="middle">VS</text>

  <!-- Hermes icon area -->
  <rect x="420" y="200" width="180" height="180" rx="20" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>
  <text x="510" y="280" fill="#a78bfa" font-family="monospace" font-size="36" font-weight="700" text-anchor="middle">H</text>
  <text x="510" y="320" fill="rgba(255,255,255,0.7)" font-family="monospace" font-size="14" text-anchor="middle">HERMES</text>
  <text x="510" y="345" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="11" text-anchor="middle">Nous Research</text>

  <!-- Title -->
  <text x="600" y="100" fill="url(#text-grad)" font-family="sans-serif" font-size="42" font-weight="800" text-anchor="middle">Codex vs Hermes</text>

  <!-- Subtitle -->
  <text x="600" y="160" fill="rgba(255,255,255,0.8)" font-family="sans-serif" font-size="22" font-weight="600" text-anchor="middle">Codex 那么全能，为什么还需要 Hermes？</text>

  <!-- Bottom description -->
  <text x="600" y="450" fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="14" text-anchor="middle">深入对比两类 AI Agent 的架构哲学、适用场景与工程边界</text>

  <!-- Feature pills -->
  <rect x="680" y="480" width="200" height="35" rx="17" fill="rgba(34,211,238,0.1)" stroke="#22d3ee" stroke-width="1"/>
  <text x="780" y="503" fill="#22d3ee" font-family="monospace" font-size="12" text-anchor="middle">架构图 · 源码分析</text>

  <rect x="680" y="525" width="260" height="35" rx="17" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="1"/>
  <text x="810" y="548" fill="#a78bfa" font-family="monospace" font-size="12" text-anchor="middle">使用场景 · 复杂案例</text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#text-grad)" opacity="0.3"/>

  <!-- Author and date -->
  <text x="50" y="600" fill="rgba(255,255,255,0.3)" font-family="monospace" font-size="11">zcxGGmu · June 2026</text>
</svg>