<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="60%" stop-color="#111133"/>
      <stop offset="100%" stop-color="#0d0d24"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="vs-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="40%" stop-color="#67e8f9"/>
      <stop offset="60%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-xl">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Left glow (Codex) -->
  <ellipse cx="250" cy="350" rx="300" ry="250" fill="url(#cyan-glow)"/>
  <!-- Right glow (Hermes) -->
  <ellipse cx="950" cy="350" rx="300" ry="250" fill="url(#purple-glow)"/>

  <!-- Center VS dividing line glow -->
  <line x1="600" y1="80" x2="600" y2="560" stroke="url(#vs-grad)" stroke-width="1" opacity="0.3"/>

  <!-- Left: Codex Icon -->
  <g filter="url(#glow-md)">
    <!-- Outer ring -->
    <circle cx="250" cy="290" r="85" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <circle cx="250" cy="290" r="75" fill="rgba(34,211,238,0.08)" stroke="#22d3ee" stroke-width="1" opacity="0.6"/>
    <!-- Inner ring -->
    <circle cx="250" cy="290" r="55" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>
    <!-- Center icon - stylized "C" -->
    <path d="M 285 255 A 45 45 0 1 0 285 325" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
    <!-- Terminal cursor -->
    <rect x="283" y="245" width="14" height="5" rx="2" fill="#22d3ee" opacity="0.8"/>
  </g>

  <!-- Codex label -->
  <text x="250" y="405" fill="#22d3ee" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="28" font-weight="800" text-anchor="middle" letter-spacing="8">CODEX</text>
  <text x="250" y="430" fill="rgba(255,255,255,0.3)" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="11" text-anchor="middle" letter-spacing="3">OPENAI</text>

  <!-- Right: Hermes Icon -->
  <g filter="url(#glow-md)">
    <!-- Outer ring -->
    <circle cx="950" cy="290" r="85" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
    <circle cx="950" cy="290" r="75" fill="rgba(167,139,250,0.08)" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
    <!-- Inner ring -->
    <circle cx="950" cy="290" r="55" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1" opacity="0.8"/>
    <!-- Stylized "H" -->
    <line x1="928" y1="260" x2="928" y2="320" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
    <line x1="972" y1="260" x2="972" y2="320" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
    <line x1="928" y1="290" x2="972" y2="290" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
    <!-- Connecting dots (skills) -->
    <circle cx="910" cy="270" r="3" fill="#c4b5fd" opacity="0.6"/>
    <circle cx="990" cy="270" r="3" fill="#c4b5fd" opacity="0.6"/>
    <circle cx="910" cy="310" r="3" fill="#c4b5fd" opacity="0.6"/>
    <circle cx="990" cy="310" r="3" fill="#c4b5fd" opacity="0.6"/>
  </g>

  <!-- Hermes label -->
  <text x="950" y="405" fill="#a78bfa" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="28" font-weight="800" text-anchor="middle" letter-spacing="8">HERMES</text>
  <text x="950" y="430" fill="rgba(255,255,255,0.3)" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="11" text-anchor="middle" letter-spacing="3">NOUS RESEARCH</text>

  <!-- Center VS Badge -->
  <rect x="556" y="265" width="88" height="50" rx="25" fill="#0a0a1a" stroke="url(#vs-grad)" stroke-width="2" filter="url(#glow-sm)"/>
  <text x="600" y="297" fill="url(#vs-grad)" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="22" font-weight="900" text-anchor="middle">VS</text>

  <!-- Title -->
  <text x="600" y="105" fill="url(#title-grad)" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="40" font-weight="800" text-anchor="middle" letter-spacing="2">Codex vs Hermes</text>

  <!-- Subtitle -->
  <text x="600" y="145" fill="rgba(255,255,255,0.7)" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="18" font-weight="400" text-anchor="middle" letter-spacing="1">Codex 那么全能，为什么还需要 Hermes？</text>

  <!-- Bottom features row -->
  <g transform="translate(0, 490)">
    <!-- Feature 1 -->
    <rect x="100" y="0" width="220" height="60" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <circle cx="130" cy="30" r="4" fill="#22d3ee"/>
    <text x="145" y="28" fill="#22d3ee" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700">架构图</text>
    <text x="145" y="46" fill="rgba(255,255,255,0.35)" font-family="'Segoe UI', sans-serif" font-size="11">Fireworks 深色主题架构图</text>

    <!-- Feature 2 -->
    <rect x="350" y="0" width="220" height="60" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <circle cx="380" cy="30" r="4" fill="#a78bfa"/>
    <text x="395" y="28" fill="#a78bfa" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700">场景分析</text>
    <text x="395" y="46" fill="rgba(255,255,255,0.35)" font-family="'Segoe UI', sans-serif" font-size="11">6 大使用场景深度对比</text>

    <!-- Feature 3 -->
    <rect x="600" y="0" width="220" height="60" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <circle cx="630" cy="30" r="4" fill="#f472b6"/>
    <text x="645" y="28" fill="#f472b6" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700">源码解读</text>
    <text x="645" y="46" fill="rgba(255,255,255,0.35)" font-family="'Segoe UI', sans-serif" font-size="11">GitHub 源码结构分析</text>

    <!-- Feature 4 -->
    <rect x="850" y="0" width="220" height="60" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <circle cx="880" cy="30" r="4" fill="#34d399"/>
    <text x="895" y="28" fill="#34d399" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700">复杂案例</text>
    <text x="895" y="46" fill="rgba(255,255,255,0.35)" font-family="'Segoe UI', sans-serif" font-size="11">Hermes 真实使用案例</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#title-grad)" opacity="0.15"/>

  <!-- Author -->
  <text x="50" y="608" fill="rgba(255,255,255,0.2)" font-family="'Segoe UI', sans-serif" font-size="10">zcxGGmu · June 2026</text>
  <text x="1150" y="608" fill="rgba(255,255,255,0.2)" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="end">AI Agent Series</text>
</svg>