<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Quant Trading System</title>
  <desc id="desc">A technical cover image for an article about AI quantitative trading and trading system engineering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.48" stop-color="#14213d"/>
      <stop offset="1" stop-color="#14342b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#f6c85f"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.22" stroke="#e2e8f0" stroke-width="1">
    <path d="M0 170H1600M0 320H1600M0 470H1600M0 620H1600M0 770H1600"/>
    <path d="M190 0V900M390 0V900M590 0V900M790 0V900M990 0V900M1190 0V900M1390 0V900"/>
  </g>

  <g transform="translate(180 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="1240" height="600" rx="28" fill="#f8fafc" opacity="0.96"/>
    <rect x="44" y="44" width="1152" height="512" rx="18" fill="#0b1220"/>
    <path d="M80 420C165 325 230 350 300 275C365 204 430 241 500 192C590 128 670 162 760 116C860 66 945 125 1030 102C1085 88 1132 70 1160 56" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M80 455C165 408 250 444 330 392C425 330 500 360 575 304C672 232 770 258 855 206C950 148 1050 186 1160 142" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" opacity="0.78"/>

    <g fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="22">
      <text x="86" y="515">risk</text>
      <text x="230" y="515">data</text>
      <text x="380" y="515">features</text>
      <text x="585" y="515">model</text>
      <text x="745" y="515">OMS</text>
      <text x="910" y="515">execution</text>
      <text x="1090" y="515">PnL</text>
    </g>

    <g transform="translate(72 78)" font-family="Inter, Arial, sans-serif">
      <text x="0" y="0" fill="#e2e8f0" font-size="42" font-weight="700">AI Quant</text>
      <text x="0" y="48" fill="#94a3b8" font-size="24">research -> risk -> execution</text>
    </g>

    <g transform="translate(760 340)" font-family="Inter, Arial, sans-serif">
      <rect x="0" y="0" width="360" height="98" rx="18" fill="#111827" stroke="#334155"/>
      <text x="28" y="40" fill="#f8fafc" font-size="24" font-weight="700">Vertical Integration</text>
      <text x="28" y="72" fill="#94a3b8" font-size="18">models are features, risk is law</text>
    </g>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <text x="180" y="815" fill="#f8fafc" font-size="44" font-weight="700">AI 量化：从模型到交易系统</text>
    <text x="180" y="858" fill="#cbd5e1" font-size="24">模型、风险、执行、回测与可观测性的工程闭环</text>
  </g>
</svg>
