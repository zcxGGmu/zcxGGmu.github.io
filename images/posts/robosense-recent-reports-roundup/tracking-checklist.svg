<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620"><style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',Arial,sans-serif}.title{font-size:34px;font-weight:800;fill:#0f172a}.sub{font-size:17px;fill:#475569}.label{font-size:15px;fill:#334155}.small{font-size:12px;fill:#64748b}.num{font-size:22px;font-weight:800;fill:#0f172a}.box{fill:#fff;stroke:#dbe3ef;stroke-width:1.2}.blue{fill:#2563eb}.green{fill:#059669}.orange{fill:#ea580c}.red{fill:#dc2626}.muted{fill:#f8fafc}.line{stroke:#dbe3ef;stroke-width:1.2}</style>
<rect width="1100" height="620" fill="#f8fafc"/><text x="50" y="58" class="title">后续跟踪清单</text><text x="50" y="90" class="sub">不要只看目标价，要看假设是否兑现</text>
<rect x="60" y="130" width="980" height="52" rx="12" fill="#fff" stroke="#dbe3ef"/><circle cx="90" cy="156" r="10" fill="#2563eb"/><text x="118" y="152" class="label">收入增长</text><text x="260" y="152" class="small">季度收入是否持续高于同比+40%，下半年新品能否补足Q1环比下滑</text><rect x="60" y="202" width="980" height="52" rx="12" fill="#fff" stroke="#dbe3ef"/><circle cx="90" cy="228" r="10" fill="#2563eb"/><text x="118" y="224" class="label">毛利率</text><text x="260" y="224" class="small">EMX/E平台量产初期费用消化后，毛利率能否回到25%以上</text><rect x="60" y="274" width="980" height="52" rx="12" fill="#fff" stroke="#dbe3ef"/><circle cx="90" cy="300" r="10" fill="#2563eb"/><text x="118" y="296" class="label">机器人业务</text><text x="260" y="296" class="small">机器人及其他销量高增是否能转化为收入和高毛利，而非低价放量</text><rect x="60" y="346" width="980" height="52" rx="12" fill="#fff" stroke="#dbe3ef"/><circle cx="90" cy="372" r="10" fill="#059669"/><text x="118" y="368" class="label">ADAS市占率</text><text x="260" y="368" class="small">定点数、SOP车型和高阶智驾渗透能否抵消ASP下降</text><rect x="60" y="418" width="980" height="52" rx="12" fill="#fff" stroke="#dbe3ef"/><circle cx="90" cy="444" r="10" fill="#059669"/><text x="118" y="440" class="label">芯片量产</text><text x="260" y="440" class="small">凤凰/孔雀双芯年内量产后的BOM降本和良率数据</text><rect x="60" y="490" width="980" height="52" rx="12" fill="#fff" stroke="#dbe3ef"/><circle cx="90" cy="516" r="10" fill="#059669"/><text x="118" y="512" class="label">现金流和费用</text><text x="260" y="512" class="small">研发、销售投入是否拖累non-GAAP盈利转正路径</text>
</svg>