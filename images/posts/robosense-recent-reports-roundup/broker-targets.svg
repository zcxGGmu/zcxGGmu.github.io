<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620"><style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',Arial,sans-serif}.title{font-size:34px;font-weight:800;fill:#0f172a}.sub{font-size:17px;fill:#475569}.label{font-size:15px;fill:#334155}.small{font-size:12px;fill:#64748b}.num{font-size:22px;font-weight:800;fill:#0f172a}.box{fill:#fff;stroke:#dbe3ef;stroke-width:1.2}.blue{fill:#2563eb}.green{fill:#059669}.orange{fill:#ea580c}.red{fill:#dc2626}.muted{fill:#f8fafc}.line{stroke:#dbe3ef;stroke-width:1.2}</style>
<rect width="1100" height="620" fill="#ffffff"/><text x="50" y="60" class="title">近期券商目标价与评级</text><text x="50" y="92" class="sub">单位：港元；仅整理公开可检索信息</text>
<line x1="220" y1="150" x2="990" y2="150" class="line"/><line x1="220" y1="510" x2="990" y2="510" class="line"/>
<line x1="374" y1="145" x2="374" y2="515" stroke="#e2e8f0"/><text x="364" y="535" class="small">38</text><line x1="563.9333333333335" y1="145" x2="563.9333333333335" y2="515" stroke="#e2e8f0"/><text x="553.9333333333335" y="535" class="small">41.7</text><line x1="733.3333333333333" y1="145" x2="733.3333333333333" y2="515" stroke="#e2e8f0"/><text x="723.3333333333333" y="535" class="small">45</text><line x1="795.4466666666667" y1="145" x2="795.4466666666667" y2="515" stroke="#e2e8f0"/><text x="785.4466666666667" y="535" class="small">46.21</text><line x1="836" y1="145" x2="836" y2="515" stroke="#e2e8f0"/><text x="826" y="535" class="small">47</text><line x1="938.6666666666666" y1="145" x2="938.6666666666666" y2="515" stroke="#e2e8f0"/><text x="928.6666666666666" y="535" class="small">49</text><line x1="946.3666666666666" y1="145" x2="946.3666666666666" y2="515" stroke="#e2e8f0"/><text x="936.3666666666666" y="535" class="small">49.15</text>
<text x="50" y="185" class="label">美银</text><circle cx="374" cy="180" r="8" fill="#2563eb"/><text x="388" y="185" class="label">38 / 买入</text><text x="690" y="185" class="small">下调目标价，关注短期亏损与毛利率</text><text x="50" y="225" class="label">富瑞</text><circle cx="563.9333333333335" cy="220" r="8" fill="#2563eb"/><text x="577.9333333333335" y="225" class="label">41.7 / 买入</text><text x="690" y="225" class="small">需求强但竞争分散</text><text x="50" y="265" class="label">摩通</text><circle cx="733.3333333333333" cy="260" r="8" fill="#2563eb"/><text x="747.3333333333333" y="265" class="label">45 / 增持</text><text x="690" y="265" class="small">毛利率承压但看好SPAD-SoC</text><text x="50" y="305" class="label">瑞银</text><circle cx="733.3333333333333" cy="300" r="8" fill="#2563eb"/><text x="747.3333333333333" y="305" class="label">45 / 买入</text><text x="690" y="305" class="small">下调目标价，仍看好中期成长</text><text x="50" y="345" class="label">海通国际</text><circle cx="795.4466666666667" cy="340" r="8" fill="#2563eb"/><text x="809.4466666666667" y="345" class="label">46.21 / 优于大市</text><text x="690" y="345" class="small">机器人业务重估逻辑</text><text x="50" y="385" class="label">中金</text><circle cx="836" cy="380" r="8" fill="#2563eb"/><text x="850" y="385" class="label">47 / 跑赢行业</text><text x="690" y="385" class="small">1Q26符合预期</text><text x="50" y="425" class="label">国盛</text><circle cx="938.6666666666666" cy="420" r="8" fill="#2563eb"/><text x="952.6666666666666" y="425" class="label">49 / 买入</text><text x="690" y="425" class="small">下半年交付+机器人+自研芯片</text><text x="50" y="465" class="label">交银国际</text><circle cx="946.3666666666666" cy="460" r="8" fill="#2563eb"/><text x="960.3666666666666" y="465" class="label">49.15 / 买入</text><text x="690" y="465" class="small">4Q25盈利后上调目标价</text>
<text x="50" y="585" class="small">目标价来自公开新闻/PDF披露，口径和日期不同，不应机械比较。</text>
