<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600"><style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',Arial,sans-serif}.title{font-size:34px;font-weight:800;fill:#0f172a}.sub{font-size:17px;fill:#475569}.label{font-size:15px;fill:#334155}.small{font-size:12px;fill:#64748b}.num{font-size:22px;font-weight:800;fill:#0f172a}.box{fill:#fff;stroke:#dbe3ef;stroke-width:1.2}.blue{fill:#2563eb}.green{fill:#059669}.orange{fill:#ea580c}.red{fill:#dc2626}.muted{fill:#f8fafc}.line{stroke:#dbe3ef;stroke-width:1.2}</style>
<rect width="1100" height="600" fill="#fff"/><text x="50" y="58" class="title">三条成长主线</text><text x="50" y="90" class="sub">从“激光雷达硬件”到“物理AI传感和执行部件平台”</text>
<rect x="55" y="150" width="310" height="310" rx="22" fill="#eff6ff"/><text x="81" y="200" class="num">ADAS车载</text><text x="81" y="244" class="label">177款车型定点</text><text x="81" y="286" class="small"><tspan x="81" dy="0">E平台累计交付突破30万台；36家整车厂和一级供</tspan><tspan x="81" dy="22">应商</tspan><tspan x="81" dy="22"></tspan></text><text x="81" y="398" class="small">关注：车型SOP节奏、ASP、客户集中度</text><rect x="405" y="150" width="310" height="310" rx="22" fill="#ecfdf5"/><text x="431" y="200" class="num">机器人及其他</text><text x="431" y="244" class="label">Q1销量同比+1458.8%</text><text x="431" y="286" class="small"><tspan x="431" dy="0">割草机、清洁机器人、无人配送、人形机器人、Rob</tspan><tspan x="431" dy="22">otaxi/Robotruck</tspan><tspan x="431" dy="22"></tspan></text><text x="431" y="398" class="small">关注：场景复用率、毛利率、订单可持续性</text><rect x="755" y="150" width="310" height="310" rx="22" fill="#fff7ed"/><text x="781" y="200" class="num">SPAD-SoC芯片</text><text x="781" y="244" class="label">创世架构</text><text x="781" y="286" class="small"><tspan x="781" dy="0">凤凰/孔雀双芯，目标是更低成本、更高性能、更小体</tspan><tspan x="781" dy="22">积</tspan><tspan x="781" dy="22"></tspan></text><text x="781" y="398" class="small">关注：量产爬坡、良率、降本兑现</text>
<text x="50" y="540" class="small">官方公告披露：2026Q1收入4.588亿元、毛利率21.7%、激光雷达总销量33.03万台。</text>
</svg>