<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640"><style>text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans SC','Microsoft YaHei',Arial,sans-serif}.title{font-size:34px;font-weight:800;fill:#0f172a}.sub{font-size:17px;fill:#475569}.label{font-size:15px;fill:#334155}.small{font-size:12px;fill:#64748b}.num{font-size:22px;font-weight:800;fill:#0f172a}.box{fill:#fff;stroke:#dbe3ef;stroke-width:1.2}.blue{fill:#2563eb}.green{fill:#059669}.orange{fill:#ea580c}.red{fill:#dc2626}.muted{fill:#f8fafc}.line{stroke:#dbe3ef;stroke-width:1.2}</style>
<rect width="1100" height="640" fill="#f8fafc"/><text x="48" y="58" class="title">研报观点矩阵</text><text x="48" y="90" class="sub">同一家公司，不同机构实际在押注不同变量</text>
<rect x="48" y="130" width="1004" height="72" rx="14" class="box"/><text x="72" y="158" class="num" style="font-size:18px">机器人销量</text><text x="280" y="158" class="label">中信建投 / 海通 / 中邮</text><text x="280" y="182" class="small">Q1机器人及其他销量首次超过ADAS；割草机、清洁、无人配送、人形等场景扩张</text><text x="790" y="172" class="small">需验证：商业化节奏和单机价值量</text><rect x="48" y="222" width="1004" height="72" rx="14" class="box"/><text x="72" y="250" class="num" style="font-size:18px">ADAS定点</text><text x="280" y="250" class="label">国盛 / 中金 / 交银</text><text x="280" y="274" class="small">车企定点数量、全固态E平台交付、下半年新品集中交付</text><text x="790" y="264" class="small">需验证：ASP下滑与客户议价</text><rect x="48" y="314" width="1004" height="72" rx="14" class="box"/><text x="72" y="342" class="num" style="font-size:18px">芯片降本</text><text x="280" y="342" class="label">国盛 / 摩通</text><text x="280" y="366" class="small">SPAD-SoC创世架构、凤凰/孔雀双芯年内量产</text><text x="790" y="356" class="small">需验证：量产爬坡与良率</text><rect x="48" y="406" width="1004" height="72" rx="14" class="box"/><text x="72" y="434" class="num" style="font-size:18px">盈利拐点</text><text x="280" y="434" class="label">交银 / 国盛</text><text x="280" y="458" class="small">4Q25单季度盈利，2026 non-GAAP或转正</text><text x="790" y="448" class="small">需验证：毛利率回落和费用投入</text><rect x="48" y="498" width="1004" height="72" rx="14" class="box"/><text x="72" y="526" class="num" style="font-size:18px">估值约束</text><text x="280" y="526" class="label">美银 / 瑞银 / 富瑞</text><text x="280" y="550" class="small">维持买入但下调目标价，强调短期毛利率/亏损压力</text><text x="790" y="540" class="small">需验证：市场是否继续给高PS</text>
</svg>