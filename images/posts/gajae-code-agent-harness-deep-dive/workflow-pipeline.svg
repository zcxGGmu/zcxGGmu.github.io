<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" width="1280" height="760">
<style>
text{font-family:'Helvetica Neue',Helvetica,Arial,'PingFang SC','Microsoft YaHei','Microsoft JhengHei','SimHei',sans-serif;fill:#111827}
.small{font-size:13px;fill:#6b7280}.label{font-size:14px;font-weight:600}.title{font-size:26px;font-weight:700}.subtitle{font-size:14px;fill:#6b7280}.mono{font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace;font-size:12px}.lane{font-size:12px;font-weight:700;fill:#475569;letter-spacing:.06em}
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker>
<filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity=".10"/></filter>
</defs>
<rect width="1280" height="760" fill="#ffffff"/>

<text x="52" y="58" class="title">GJC Workflow Pipeline</text>
<text x="52" y="86" class="subtitle">公开面刻意收敛为四个工作流：先澄清，再共识计划，再带证据执行；team 只在 tmux 并发确实有收益时启用</text>
<rect x="70" y="158" width="190" height="86" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
<text x="165" y="186" text-anchor="middle" class="label">deep-interview</text>
<text x="165" y="206" text-anchor="middle" class="small">Socratic questions</text>
<text x="165" y="224" text-anchor="middle" class="small">ambiguity threshold</text>
<text x="165" y="242" text-anchor="middle" class="small">final spec</text>
<rect x="330" y="158" width="210" height="86" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="435" y="186" text-anchor="middle" class="label">ralplan</text>
<text x="435" y="206" text-anchor="middle" class="small">Planner -> Architect</text>
<text x="435" y="224" text-anchor="middle" class="small">Critic loop</text>
<text x="435" y="242" text-anchor="middle" class="small">pending approval</text>
<rect x="610" y="158" width="190" height="86" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
<text x="705" y="186" text-anchor="middle" class="label">Approval Gate</text>
<text x="705" y="206" text-anchor="middle" class="small">explicit user approval</text>
<text x="705" y="224" text-anchor="middle" class="small">handoff state</text>
<rect x="870" y="158" width="190" height="86" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#shadow)"/>
<text x="965" y="186" text-anchor="middle" class="label">ultragoal</text>
<text x="965" y="206" text-anchor="middle" class="small">goals.json</text>
<text x="965" y="224" text-anchor="middle" class="small">ledger.jsonl</text>
<text x="965" y="242" text-anchor="middle" class="small">completion evidence</text>
<rect x="70" y="402" width="190" height="82" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="165" y="430" text-anchor="middle" class="label">executor</text>
<text x="165" y="450" text-anchor="middle" class="small">bounded mutation</text>
<text x="165" y="468" text-anchor="middle" class="small">focused checks</text>
<rect x="330" y="402" width="190" height="82" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="425" y="430" text-anchor="middle" class="label">architect</text>
<text x="425" y="450" text-anchor="middle" class="small">read-only design</text>
<text x="425" y="468" text-anchor="middle" class="small">tradeoff review</text>
<rect x="590" y="402" width="190" height="82" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="685" y="430" text-anchor="middle" class="label">planner</text>
<text x="685" y="450" text-anchor="middle" class="small">sequencing</text>
<text x="685" y="468" text-anchor="middle" class="small">acceptance criteria</text>
<rect x="850" y="402" width="190" height="82" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="945" y="430" text-anchor="middle" class="label">critic</text>
<text x="945" y="450" text-anchor="middle" class="small">quality gate</text>
<text x="945" y="468" text-anchor="middle" class="small">actionability review</text>
<rect x="1088" y="402" width="140" height="82" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
<text x="1158" y="430" text-anchor="middle" class="label">team</text>
<text x="1158" y="450" text-anchor="middle" class="small">tmux workers</text>
<text x="1158" y="468" text-anchor="middle" class="small">mailbox state</text>
<path d="M 260 201 L 330 201" fill="none" stroke="#2563eb" stroke-width="2"  marker-end="url(#arrow-blue)"/><path d="M 540 201 L 610 201" fill="none" stroke="#2563eb" stroke-width="2"  marker-end="url(#arrow-blue)"/><path d="M 800 201 L 870 201" fill="none" stroke="#2563eb" stroke-width="2"  marker-end="url(#arrow-blue)"/>
<path d="M 435 244 C 430 305 710 305 715 244" fill="none" stroke="#16a34a" stroke-width="2"  marker-end="url(#arrow-green)"/>
<text x="575" y="292" class="small" text-anchor="middle">consensus loop, max iterations</text>
<path d="M 965 244 C 1010 315 1095 332 1152 402" fill="none" stroke="#9333ea" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow-purple)"/>
<text x="1050" y="330" class="small">optional parallelization</text>
<path d="M 965 244 C 920 320 880 360 920 402" fill="none" stroke="#2563eb" stroke-width="2"  marker-end="url(#arrow-blue)"/>
<path d="M 260 443 L 330 443" fill="none" stroke="#16a34a" stroke-width="2"  marker-end="url(#arrow-green)"/><path d="M 520 443 L 590 443" fill="none" stroke="#16a34a" stroke-width="2"  marker-end="url(#arrow-green)"/><path d="M 780 443 L 850 443" fill="none" stroke="#16a34a" stroke-width="2"  marker-end="url(#arrow-green)"/>
<rect x="84" y="595" width="1042" height="72" rx="12" fill="#f8fafc" stroke="#e5e7eb"/>
<text x="110" y="626" class="label">为什么这条链路重要</text>
<text x="110" y="654" class="small">GJC 把“模型会做什么”改成“流程是否留下 spec、plan、goal、ledger、review、artifact 和 verification evidence”。它牺牲了一部分轻便性，换来更强的复盘和协作边界。</text>

</svg>