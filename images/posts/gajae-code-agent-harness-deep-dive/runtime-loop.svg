<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" width="1280" height="780">
<style>
text{font-family:'Helvetica Neue',Helvetica,Arial,'PingFang SC','Microsoft YaHei','Microsoft JhengHei','SimHei',sans-serif;fill:#111827}
.small{font-size:13px;fill:#6b7280}.label{font-size:14px;font-weight:600}.title{font-size:26px;font-weight:700}.subtitle{font-size:14px;fill:#6b7280}.mono{font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace;font-size:12px}.lane{font-size:12px;font-weight:700;fill:#475569;letter-spacing:.06em}
</style>
<defs>
<marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#2563eb"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#16a34a"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#9333ea"/></marker>
<marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#dc2626"/></marker>
<filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity=".10"/></filter>
</defs>
<rect width="1280" height="780" fill="#ffffff"/>

<text x="52" y="58" class="title">单轮 Agent Runtime 流程图</text>
<text x="52" y="86" class="subtitle">agent-loop 的关键不是一次模型调用，而是“模型流事件 -> 工具执行 -> 结果回填 -> 继续/暂停/结束”的闭环</text>
<rect x="80" y="145" width="150" height="72" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
<text x="155" y="173" text-anchor="middle" class="label">User Prompt</text>
<text x="155" y="193" text-anchor="middle" class="small">CLI / TUI / RPC</text>
<rect x="285" y="145" width="170" height="72" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="370" y="173" text-anchor="middle" class="label">AgentSession</text>
<text x="370" y="193" text-anchor="middle" class="small">queue / retry</text>
<text x="370" y="211" text-anchor="middle" class="small">session events</text>
<rect x="520" y="145" width="170" height="72" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="605" y="173" text-anchor="middle" class="label">Context Sync</text>
<text x="605" y="193" text-anchor="middle" class="small">system prompt</text>
<text x="605" y="211" text-anchor="middle" class="small">rules / tools</text>
<rect x="755" y="145" width="180" height="72" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#shadow)"/>
<text x="845" y="173" text-anchor="middle" class="label">streamSimple</text>
<text x="845" y="193" text-anchor="middle" class="small">provider adapter</text>
<text x="845" y="211" text-anchor="middle" class="small">unified events</text>
<rect x="1000" y="145" width="170" height="72" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="1085" y="173" text-anchor="middle" class="label">Assistant Msg</text>
<text x="1085" y="193" text-anchor="middle" class="small">text / thinking</text>
<text x="1085" y="211" text-anchor="middle" class="small">tool calls</text>
<path d="M 230 181 L 285 181" fill="none" stroke="#2563eb" stroke-width="2"  marker-end="url(#arrow-blue)"/><path d="M 455 181 L 520 181" fill="none" stroke="#2563eb" stroke-width="2"  marker-end="url(#arrow-blue)"/><path d="M 690 181 L 755 181" fill="none" stroke="#2563eb" stroke-width="2"  marker-end="url(#arrow-blue)"/><path d="M 935 181 L 1000 181" fill="none" stroke="#2563eb" stroke-width="2"  marker-end="url(#arrow-blue)"/>
<rect x="142" y="330" width="180" height="78" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
<text x="232" y="358" text-anchor="middle" class="label">Tool Calls?</text>
<text x="232" y="378" text-anchor="middle" class="small">validate args</text>
<text x="232" y="396" text-anchor="middle" class="small">before hook</text>
<rect x="382" y="330" width="200" height="78" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="482" y="358" text-anchor="middle" class="label">Tool Registry</text>
<text x="482" y="378" text-anchor="middle" class="small">read / bash / edit</text>
<text x="482" y="396" text-anchor="middle" class="small">search / task / eval</text>
<rect x="642" y="330" width="180" height="78" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="732" y="358" text-anchor="middle" class="label">Native Layer</text>
<text x="732" y="378" text-anchor="middle" class="small">grep / AST</text>
<text x="732" y="396" text-anchor="middle" class="small">PTY / shell</text>
<rect x="882" y="330" width="180" height="78" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="972" y="358" text-anchor="middle" class="label">Tool Result</text>
<text x="972" y="378" text-anchor="middle" class="small">coerce result</text>
<text x="972" y="396" text-anchor="middle" class="small">error flag</text>
<rect x="1110" y="330" width="118" height="78" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="1169" y="358" text-anchor="middle" class="label">Append</text>
<text x="1169" y="378" text-anchor="middle" class="small">context</text>
<path d="M 1085 217 C 1040 282 250 276 232 330" fill="none" stroke="#16a34a" stroke-width="2"  marker-end="url(#arrow-green)"/>
<path d="M 322 369 L 382 369" fill="none" stroke="#16a34a" stroke-width="2"  marker-end="url(#arrow-green)"/><path d="M 582 369 L 642 369" fill="none" stroke="#9333ea" stroke-width="2"  marker-end="url(#arrow-purple)"/><path d="M 822 369 L 882 369" fill="none" stroke="#16a34a" stroke-width="2"  marker-end="url(#arrow-green)"/><path d="M 1062 369 L 1110 369" fill="none" stroke="#16a34a" stroke-width="2"  marker-end="url(#arrow-green)"/>
<path d="M 1168 330 C 1198 260 1148 230 1100 217" fill="none" stroke="#16a34a" stroke-width="2"  marker-end="url(#arrow-green)"/>
<rect x="132" y="560" width="190" height="70" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
<text x="227" y="588" text-anchor="middle" class="label">No More Work</text>
<text x="227" y="608" text-anchor="middle" class="small">follow-up queue?</text>
<text x="227" y="626" text-anchor="middle" class="small">pause gate?</text>
<rect x="382" y="560" width="190" height="70" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="477" y="588" text-anchor="middle" class="label">Persist</text>
<text x="477" y="608" text-anchor="middle" class="small">JSONL entries</text>
<text x="477" y="626" text-anchor="middle" class="small">model/thinking state</text>
<rect x="632" y="560" width="190" height="70" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="727" y="588" text-anchor="middle" class="label">Artifacts</text>
<text x="727" y="608" text-anchor="middle" class="small">artifact:// logs</text>
<text x="727" y="626" text-anchor="middle" class="small">agent:// output</text>
<rect x="882" y="560" width="190" height="70" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
<text x="977" y="588" text-anchor="middle" class="label">Telemetry</text>
<text x="977" y="608" text-anchor="middle" class="small">coverage</text>
<text x="977" y="626" text-anchor="middle" class="small">usage / spans</text>
<rect x="1110" y="560" width="118" height="70" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="1169" y="588" text-anchor="middle" class="label">End</text>
<text x="1169" y="608" text-anchor="middle" class="small">return</text>
<path d="M 1110 408 C 1090 500 322 505 228 560" fill="none" stroke="#2563eb" stroke-width="2"  marker-end="url(#arrow-blue)"/>
<path d="M 322 595 L 382 595" fill="none" stroke="#9333ea" stroke-width="2"  marker-end="url(#arrow-purple)"/><path d="M 572 595 L 632 595" fill="none" stroke="#9333ea" stroke-width="2"  marker-end="url(#arrow-purple)"/><path d="M 822 595 L 882 595" fill="none" stroke="#9333ea" stroke-width="2"  marker-end="url(#arrow-purple)"/><path d="M 1072 595 L 1110 595" fill="none" stroke="#9333ea" stroke-width="2"  marker-end="url(#arrow-purple)"/>
<rect x="80" y="690" width="1088" height="42" rx="10" fill="#f8fafc" stroke="#e5e7eb"/>
<text x="105" y="716" class="small">关键设计：工具结果在进入上下文前被统一校验和清洗；大输出走 artifact，图片走 blob，减少 JSONL 会话膨胀；follow-up/steering 让循环能被用户或内部 gate 继续。</text>

</svg>